<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0c0f">
    <title>GYM PRO — Дневник тренировок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0c0f; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #eef2ff; padding-bottom: 80px; }
        .app-container { max-width: 560px; margin: 0 auto; padding: 18px 16px 90px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 560px; margin: 0 auto; background: #111417e6; backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 16px 22px; border-top: 0.5px solid #2a2f38; z-index: 100; }
        .nav-btn { background: none; border: none; color: #8e96a6; font-size: 12px; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 8px; border-radius: 40px; cursor: pointer; }
        .nav-btn.active { color: #ffb347; background: #1e1f2c; }
        .nav-icon { font-size: 22px; }
        .card { background: #12151c; border-radius: 28px; padding: 20px 16px; margin-bottom: 20px; border: 1px solid #262c34; }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .exercise-card { background: #0f1219; border-radius: 24px; padding: 16px; margin-bottom: 20px; border-left: 3px solid #ffb347; }
        .exercise-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .set-row { background: #1a1e28; border-radius: 20px; padding: 12px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .set-number { font-weight: 600; width: 50px; }
        .input-group { display: flex; gap: 8px; background: #0b0e14; padding: 4px 10px; border-radius: 40px; align-items: center; }
        .input-group input { background: none; border: none; color: #fff; width: 55px; font-size: 16px; font-weight: 500; text-align: center; outline: none; }
        .timer-btn, .btn-primary { background: #2a2f3c; border: none; padding: 8px 14px; border-radius: 40px; color: white; font-weight: 500; font-size: 13px; cursor: pointer; }
        .btn-primary { background: #ffb347; color: #0a0c0f; width: 100%; text-align: center; font-weight: 700; padding: 12px; margin-top: 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .food-log { background: #0f1219; border-radius: 20px; padding: 12px; margin: 10px 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 12px; }
        .calendar-day { padding: 8px; border-radius: 30px; background: #1a1e28; }
        .calendar-day.workout { background: #ffb347; color: #0a0c0f; }
        .photo-preview { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; margin-top: 8px; }
        button:active { transform: scale(0.97); }
        input[type=file] { display: none; }
        select { background: #1a1e28; color: white; border-radius: 40px; padding: 10px; border: 1px solid #2a2f38; width: 100%; margin-bottom: 12px; font-size: 14px; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>
<div class="bottom-nav" id="bottomNav">
    <button class="nav-btn" data-tab="training"><span class="nav-icon">🏋️</span><span>Тренировка</span></button>
    <button class="nav-btn" data-tab="calendar"><span class="nav-icon">📅</span><span>Календарь</span></button>
    <button class="nav-btn" data-tab="food"><span class="nav-icon">🥗</span><span>Питание</span></button>
    <button class="nav-btn" data-tab="exercises"><span class="nav-icon">📝</span><span>Упражнения</span></button>
    <button class="nav-btn" data-tab="progress"><span class="nav-icon">📈</span><span>Прогресс</span></button>
    <button class="nav-btn" data-tab="settings"><span class="nav-icon">⚙️</span><span>Настройки</span></button>
</div>
<script>
    (function() {
        // ========== ДАННЫЕ ==========
        let sessionData = JSON.parse(localStorage.getItem("gym_session") || '{"workouts":{},"historyMax":{},"workoutDates":[]}');
        let customExercises = JSON.parse(localStorage.getItem("custom_exercises") || '[]');
        let exercisePhotos = JSON.parse(localStorage.getItem("exercise_photos") || '{}');
        
        function saveSession() { localStorage.setItem("gym_session", JSON.stringify(sessionData)); }
        function saveCustom() { localStorage.setItem("custom_exercises", JSON.stringify(customExercises)); }
        function savePhotos() { localStorage.setItem("exercise_photos", JSON.stringify(exercisePhotos)); }
        
        // Базовые упражнения
        const defaultExercises = {
            "Жим гантелей лежа": { sets: 4, targetReps: "8-12", restSec: 120 },
            "Жим ногами": { sets: 4, targetReps: "10-12", restSec: 150 },
            "Тяга штанги в наклоне": { sets: 4, targetReps: "8-10", restSec: 120 },
            "Приседания с гантелью": { sets: 4, targetReps: "10-12", restSec: 150 },
            "Сгибание рук со штангой": { sets: 3, targetReps: "10-12", restSec: 90 },
            "Разгибание рук на блоке": { sets: 3, targetReps: "12-15", restSec: 60 }
        };
        
        let allExercises = { ...defaultExercises };
        customExercises.forEach(ex => { allExercises[ex.name] = { sets: ex.sets, targetReps: ex.targetReps, restSec: ex.restSec, isCustom: true }; });
        
        // Состояние
        let currentTab = "training";
        let todayStr = new Date().toISOString().split('T')[0];
        let activeDay = todayStr;
        let exerciseList = Object.keys(allExercises);
        let currentExerciseIndex = 0;
        let timerInterval = null, timerRemaining = 0, activeTimerExercise = null;
        
        function initWorkout(day) {
            if(!sessionData.workouts[day]) sessionData.workouts[day] = {};
            if(!sessionData.workoutDates.includes(day) && day === todayStr) {
                sessionData.workoutDates.push(day);
                saveSession();
            }
        }
        
        function renderCurrentView() {
            if(currentTab === "training") renderTraining();
            else if(currentTab === "calendar") renderCalendar();
            else if(currentTab === "food") renderFood();
            else if(currentTab === "exercises") renderExercises();
            else if(currentTab === "progress") renderProgress();
            else renderSettings();
            document.querySelectorAll(".nav-btn").forEach(btn => {
                if(btn.dataset.tab === currentTab) btn.classList.add("active");
                else btn.classList.remove("active");
            });
        }
        
        // ========== ТРЕНИРОВКА (исправлено) ==========
        function renderTraining() {
            initWorkout(activeDay);
            exerciseList = Object.keys(allExercises);
            if(currentExerciseIndex >= exerciseList.length) currentExerciseIndex = 0;
            let currentExName = exerciseList[currentExerciseIndex];
            let ex = allExercises[currentExName];
            if(!ex) { currentExerciseIndex = 0; currentExName = exerciseList[0]; ex = allExercises[currentExName]; }
            
            let setsData = sessionData.workouts[activeDay][currentExName];
            if(!setsData || setsData.length !== ex.sets) {
                setsData = Array(ex.sets).fill().map(() => ({ weight: "", reps: "" }));
                sessionData.workouts[activeDay][currentExName] = setsData;
                saveSession();
            }
            
            // Таймер
            let timerHtml = "";
            if(timerInterval && activeTimerExercise === currentExName) {
                let m = Math.floor(timerRemaining/60), s = timerRemaining%60;
                timerHtml = `<div class="card" style="background:#1f2a1f;text-align:center"><div style="font-size:24px">⏱️ Отдых: ${m}:${s<10?'0'+s:s}</div><button class="timer-btn" id="stopTimerBtn">Остановить</button></div>`;
            }
            
            // Фото
            let photoHtml = "";
            if(exercisePhotos[currentExName]) {
                photoHtml = `<div><img src="${exercisePhotos[currentExName]}" class="photo-preview" onclick="document.getElementById('photoInput').click()"></div>`;
            }
            
            // Список подходов
            let setsHtml = "";
            for(let i=0; i<ex.sets; i++) {
                let s = setsData[i] || { weight: "", reps: "" };
                setsHtml += `<div class="set-row">
                    <span class="set-number">Подход ${i+1}</span>
                    <div class="input-group"><label>кг</label><input type="number" id="w_${i}" value="${s.weight}" placeholder="0"></div>
                    <div class="input-group"><label>повт</label><input type="number" id="r_${i}" value="${s.reps}" placeholder="0"></div>
                    <button class="timer-btn" data-setidx="${i}">⏱️ ${Math.floor(ex.restSec/60)}:${(ex.restSec%60).toString().padStart(2,'0')}</button>
                </div>`;
            }
            
            // Выбор упражнения
            let selectHtml = `<select id="exerciseSelect">`;
            exerciseList.forEach((name, idx) => {
                selectHtml += `<option value="${idx}" ${idx === currentExerciseIndex ? 'selected' : ''}>${name} ${allExercises[name].isCustom ? '✏️' : ''}</option>`;
            });
            selectHtml += `</select>`;
            
            let html = `<div class="card">
                <div class="flex-between"><span class="section-title">💪 Тренировка ${activeDay === todayStr ? 'сегодня' : activeDay}</span></div>
                ${selectHtml}
                <input type="file" id="photoInput" accept="image/*" style="display:none">
                <div class="exercise-card">
                    <div class="exercise-name">
                        ${currentExName}
                        <button class="timer-btn" id="addPhotoBtn">📸 Фото</button>
                    </div>
                    ${photoHtml}
                    ${setsHtml}
                    ${timerHtml}
                    <button class="btn-primary" id="saveExBtn">✓ Сохранить это упражнение</button>
                </div>
                <div style="display:flex; gap:12px; margin-top:12px;">
                    <button class="timer-btn" id="prevEx">◀ Предыдущее</button>
                    <button class="timer-btn" id="nextEx">Следующее ▶</button>
                </div>
            </div>`;
            
            document.getElementById("appRoot").innerHTML = html;
            
            // Обработчики
            document.getElementById("exerciseSelect").onchange = (e) => {
                currentExerciseIndex = parseInt(e.target.value);
                stopTimer();
                renderTraining();
            };
            
            document.getElementById("addPhotoBtn").onclick = () => document.getElementById("photoInput").click();
            document.getElementById("photoInput").onchange = (e) => {
                let file = e.target.files[0];
                if(file) {
                    let reader = new FileReader();
                    reader.onload = function(ev) {
                        exercisePhotos[currentExName] = ev.target.result;
                        savePhotos();
                        renderTraining();
                    };
                    reader.readAsDataURL(file);
                }
            };
            
            for(let i=0; i<ex.sets; i++) {
                let wInp = document.getElementById(`w_${i}`);
                let rInp = document.getElementById(`r_${i}`);
                if(wInp) {
                    wInp.onchange = (e) => {
                        let val = e.target.value;
                        sessionData.workouts[activeDay][currentExName][i].weight = val;
                        saveSession();
                        updateMax(currentExName, val, rInp?.value || "");
                    };
                }
                if(rInp) {
                    rInp.onchange = (e) => {
                        let val = e.target.value;
                        sessionData.workouts[activeDay][currentExName][i].reps = val;
                        saveSession();
                        updateMax(currentExName, wInp?.value || "", val);
                    };
                }
                let btn = document.querySelector(`.timer-btn[data-setidx="${i}"]`);
                if(btn) btn.onclick = () => startTimer(ex.restSec, currentExName);
            }
            
            document.getElementById("prevEx").onclick = () => {
                if(currentExerciseIndex > 0) {
                    currentExerciseIndex--;
                    stopTimer();
                    renderTraining();
                }
            };
            document.getElementById("nextEx").onclick = () => {
                if(currentExerciseIndex + 1 < exerciseList.length) {
                    currentExerciseIndex++;
                    stopTimer();
                    renderTraining();
                } else {
                    alert("🎉 Тренировка на сегодня завершена! Отличная работа!");
                }
            };
            document.getElementById("saveExBtn").onclick = () => {
                let allFilled = true;
                for(let i=0; i<ex.sets; i++) {
                    let d = sessionData.workouts[activeDay][currentExName][i];
                    if(!d || !d.weight || !d.reps) allFilled = false;
                }
                if(!allFilled) {
                    alert("Заполните вес и повторения для всех подходов!");
                } else {
                    if(currentExerciseIndex + 1 < exerciseList.length) {
                        currentExerciseIndex++;
                        stopTimer();
                        renderTraining();
                    } else {
                        alert("✅ Тренировка дня завершена! Данные сохранены.");
                    }
                }
            };
            if(document.getElementById("stopTimerBtn")) document.getElementById("stopTimerBtn").onclick = () => stopTimer();
        }
        
        function updateMax(exName, weight, reps) {
            let vol = parseFloat(weight) * parseFloat(reps);
            if(!isNaN(vol) && vol > (sessionData.historyMax[exName] || 0)) {
                sessionData.historyMax[exName] = vol;
                saveSession();
            }
        }
        
        function startTimer(seconds, exName) {
            if(timerInterval) clearInterval(timerInterval);
            timerRemaining = seconds;
            activeTimerExercise = exName;
            timerInterval = setInterval(() => {
                if(timerRemaining <= 1) {
                    stopTimer();
                    alert("⏰ Отдых закончен! Приступай к следующему подходу.");
                    renderCurrentView();
                } else {
                    timerRemaining--;
                    renderCurrentView();
                }
            }, 1000);
            renderCurrentView();
        }
        
        function stopTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            timerRemaining = 0;
            activeTimerExercise = null;
        }
        
        // ========== КАЛЕНДАРЬ ==========
        function renderCalendar() {
            let today = new Date();
            let year = today.getFullYear();
            let month = today.getMonth();
            let firstDay = new Date(year, month, 1);
            let startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            let daysInMonth = new Date(year, month+1, 0).getDate();
            let days = [];
            for(let i=0; i<startOffset; i++) days.push(null);
            for(let i=1; i<=daysInMonth; i++) days.push(i);
            let calendarHtml = `<div class="calendar">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div style="color:#ffb347">${d}</div>`).join('')}`;
            days.forEach(day => {
                if(day === null) calendarHtml += `<div></div>`;
                else {
                    let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    let hasWorkout = sessionData.workouts[dateStr] && Object.keys(sessionData.workouts[dateStr]).length > 0;
                    calendarHtml += `<div class="calendar-day ${hasWorkout ? 'workout' : ''}" onclick="alert('${dateStr}: ${hasWorkout ? "Есть записи тренировки ✅" : "Нет записей ❌"}')">${day}</div>`;
                }
            });
            calendarHtml += `</div><button class="btn-primary" id="goTodayBtn" style="margin-top:16px;">📅 Перейти к сегодняшней тренировке</button>`;
            let html = `<div class="card"><div class="section-title">📅 Календарь тренировок</div>${calendarHtml}</div><div class="card"><p>⭐ Жёлтые дни — тренировка выполнена</p></div>`;
            document.getElementById("appRoot").innerHTML = html;
            document.getElementById("goTodayBtn")?.addEventListener("click", () => {
                activeDay = new Date().toISOString().split('T')[0];
                currentTab = "training";
                currentExerciseIndex = 0;
                stopTimer();
                renderCurrentView();
            });
        }
        
        // ========== УПРАЖНЕНИЯ (добавление/удаление) ==========
        function renderExercises() {
            let exercisesList = Object.keys(allExercises).map(name => {
                let ex = allExercises[name];
                return `<div class="flex-between" style="margin:8px 0; padding:8px; background:#1a1e28; border-radius:20px;">
                    <span><strong>${name}</strong><br><small>${ex.sets} подходов × ${ex.targetReps} повторов, отдых ${ex.restSec}с</small></span>
                    <button class="timer-btn" onclick="window.deleteExerciseFn('${name.replace(/'/g, "\\'")}')">🗑️</button>
                </div>`;
            }).join('');
            let html = `<div class="card"><div class="section-title">📝 Мои упражнения</div>
                ${exercisesList || '<p>Нет упражнений</p>'}
                <button class="btn-primary" id="addExBtn">➕ Добавить своё упражнение</button>
                </div>`;
            document.getElementById("appRoot").innerHTML = html;
            document.getElementById("addExBtn").onclick = () => {
                let name = prompt("Название упражнения:");
                if(!name) return;
                let sets = parseInt(prompt("Количество подходов:", "3"));
                let targetReps = prompt("Диапазон повторений (например 8-12):", "8-12");
                let restSec = parseInt(prompt("Отдых в секундах:", "90"));
                if(name && sets && targetReps && restSec) {
                    customExercises.push({ name, sets, targetReps, restSec });
                    saveCustom();
                    allExercises[name] = { sets, targetReps, restSec, isCustom: true };
                    renderCurrentView();
                }
            };
            window.deleteExerciseFn = function(name) {
                if(confirm(`Удалить упражнение "${name}"?`)) {
                    delete allExercises[name];
                    customExercises = customExercises.filter(e => e.name !== name);
                    saveCustom();
                    renderCurrentView();
                }
            };
        }
        
        // ========== ПИТАНИЕ (простое) ==========
        let foodLog = JSON.parse(localStorage.getItem("food_log") || '{"meals":{"Завтрак":[],"Обед":[],"Ужин":[]}}');
        function renderFood() {
            let total = { p:0, f:0, c:0, kcal:0 };
            for(let m in foodLog.meals) {
                foodLog.meals[m].forEach(i => { total.p += i.p; total.f += i.f; total.c += i.c; total.kcal += i.kcal; });
            }
            let mealsHtml = "";
            for(let meal of ["Завтрак","Обед","Ужин"]) {
                let items = foodLog.meals[meal];
                let list = items.map((it,idx) => `<div class="flex-between"><span>${it.name} ${it.qty}г</span><span>${it.p}г/${it.f}г/${it.c}г | ${it.kcal}ккал</span><button class="remove-food" data-meal="${meal}" data-idx="${idx}" style="background:none;color:#ff8866;">✖</button></div>`).join("");
                mealsHtml += `<div class="food-log"><div class="flex-between"><strong>${meal}</strong><button class="add-food-btn" data-meal="${meal}">+ Добавить</button></div>${list || "<div style='color:#6c7a8c;'>— нет записей —</div>"}</div>`;
            }
            let html = `<div class="card"><div class="section-title">🥗 Дневник питания</div>
                <div class="flex-between" style="background:#1a1e28;border-radius:40px;padding:12px;margin-bottom:16px;">
                    <span>🥩 ${total.p.toFixed(1)}г</span><span>🧈 ${total.f.toFixed(1)}г</span><span>🍚 ${total.c.toFixed(1)}г</span><span>🔥 ${total.kcal.toFixed(0)}</span>
                </div>
                ${mealsHtml}
                </div>`;
            document.getElementById("appRoot").innerHTML = html;
            
            document.querySelectorAll(".add-food-btn").forEach(btn => {
                btn.onclick = () => {
                    let meal = btn.dataset.meal;
                    let name = prompt("Продукт:", "курица");
                    let grams = parseFloat(prompt("Граммы:", "100"));
                    if(name && grams) {
                        let prot = Math.round(grams * 0.2);
                        let fat = Math.round(grams * 0.1);
                        let carb = Math.round(grams * 0.3);
                        let kcal = prot*4 + fat*9 + carb*4;
                        foodLog.meals[meal].push({ name, qty: grams, p: prot, f: fat, c: carb, kcal: kcal });
                        localStorage.setItem("food_log", JSON.stringify(foodLog));
                        renderFood();
                    }
                };
            });
            document.querySelectorAll(".remove-food").forEach(btn => {
                btn.onclick = () => {
                    let meal = btn.dataset.meal;
                    let idx = parseInt(btn.dataset.idx);
                    foodLog.meals[meal].splice(idx,1);
                    localStorage.setItem("food_log", JSON.stringify(foodLog));
                    renderFood();
                };
            });
        }
        
        // ========== ПРОГРЕСС ==========
        function renderProgress() {
            let maxData = sessionData.historyMax;
            let html = `<div class="card"><div class="section-title">📊 Рекорды (макс. объём кг×повт)</div>`;
            if(Object.keys(maxData).length === 0) html += `<p>Пока нет данных. Заполните тренировки!</p>`;
            for(let [k,v] of Object.entries(maxData)) {
                html += `<div class="flex-between" style="margin:8px 0"><span>${k}</span><strong style="color:#ffb347">${Math.round(v)}</strong></div>`;
            }
            html += `<hr style="margin:16px 0"><p>🏆 Тренировок за всё время: ${sessionData.workoutDates?.length || 0}</p></div>`;
            document.getElementById("appRoot").innerHTML = html;
        }
        
        // ========== НАСТРОЙКИ ==========
        function renderSettings() {
            let html = `<div class="card"><div class="section-title">⚙️ Настройки</div>
                <button class="timer-btn" id="resetAll" style="background:#4a1e2c; width:100%">🗑️ Сбросить ВСЕ данные</button>
                <p style="margin-top:16px;">📸 Фото упражнений сохраняются в телефоне.<br>➕ Свои упражнения можно добавлять в разделе «Упражнения».</p>
                <p style="margin-top:12px; font-size:12px; color:#8e96a6">Версия 2.0 — Календарь, фото, свои упражнения</p>
                </div>`;
            document.getElementById("appRoot").innerHTML = html;
            document.getElementById("resetAll")?.addEventListener("click", () => {
                if(confirm("Удалить абсолютно все данные? Это нельзя отменить.")) {
                    localStorage.clear();
                    location.reload();
                }
            });
        }
        
        // Навигация
        document.getElementById("bottomNav").addEventListener("click", (e) => {
            let btn = e.target.closest(".nav-btn");
            if(btn && btn.dataset.tab) {
                currentTab = btn.dataset.tab;
                stopTimer();
                renderCurrentView();
            }
        });
        
        renderCurrentView();
    })();
</script>
</body>
</html>
