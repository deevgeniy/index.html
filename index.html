<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GYM PRO — Твоя программа</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0c0f; font-family: system-ui, sans-serif; color: #eef2ff; padding-bottom: 80px; }
        .app-container { max-width: 600px; margin: 0 auto; padding: 20px 16px 90px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: #111417e6; backdrop-filter: blur(20px); display: flex; justify-content: space-around; flex-wrap: wrap; padding: 8px 8px 20px; border-top: 1px solid #2a2f38; z-index: 100; }
        .nav-btn { background: none; border: none; color: #8e96a6; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 8px; border-radius: 40px; cursor: pointer; }
        .nav-btn.active { color: #ffb347; background: #1e1f2c; }
        .card { background: #12151c; border-radius: 28px; padding: 18px 16px; margin-bottom: 20px; border: 1px solid #262c34; }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .set-row { background: #1a1e28; border-radius: 20px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        input, select { background: #0b0e14; border: none; color: white; padding: 10px; border-radius: 20px; }
        input { width: 70px; text-align: center; }
        button { background: #2a2f3c; border: none; padding: 8px 14px; border-radius: 40px; color: white; cursor: pointer; }
        .btn-primary { background: #ffb347; color: #0a0c0f; font-weight: bold; width: 100%; padding: 12px; }
        .photo-item { background: #1a1e28; border-radius: 20px; padding: 12px; margin-bottom: 16px; }
        .photo-img, .exercise-photo { width: 100%; max-height: 250px; object-fit: contain; border-radius: 16px; margin-top: 8px; cursor: pointer; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 12px; }
        .calendar-day { background: #1a1e28; padding: 8px; border-radius: 30px; cursor: pointer; }
        .calendar-day.workout { background: #ffb347; color: #0a0c0f; font-weight: bold; }
        .calendar-day.today { border: 2px solid #ffb347; }
        .stats-panel { background: #0f1219; border-radius: 20px; padding: 12px; margin-bottom: 16px; text-align: center; }
        .exercise-item { background: #1a1e28; border-radius: 20px; padding: 12px; margin-bottom: 12px; }
        .swipe-area { touch-action: pan-y pinch-zoom; }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>
<div class="bottom-nav" id="nav">
    <button class="nav-btn active" data-tab="workout">🏋️ Тренировка</button>
    <button class="nav-btn" data-tab="progress">📈 Прогресс</button>
    <button class="nav-btn" data-tab="calendar">📅 Календарь</button>
    <button class="nav-btn" data-tab="measure">📏 Замеры</button>
    <button class="nav-btn" data-tab="weight">⚖️ Вес</button>
    <button class="nav-btn" data-tab="photos">📸 Фото</button>
    <button class="nav-btn" data-tab="exercises">📝 Упражнения</button>
    <button class="nav-btn" data-tab="settings">⚙️ Настройки</button>
</div>

<script>
// ==================== ТВОЯ ПРОГРАММА ТРЕНИРОВОК ====================
const PROGRAM = {
    1: { name: "День 1. Жимовый (грудь, плечи, трицепс)", exercises: [
        { name: "Жим в рычажном тренажере (Hammer Strength)", sets: 4, rest: 150, id: "hammer", desc: "Сядьте в тренажер, спина и затылок плотно прижаты к опорам." },
        { name: "Жим гантелей лежа под углом 30°", sets: 3, rest: 120, id: "db30", desc: "Скамья под углом 30°. Лопатки сведены." },
        { name: "Сведение рук в кроссовере", sets: 3, rest: 90, id: "crossover", desc: "Встаньте между верхними блоками." },
        { name: "Жим гантелей сидя (ладони друг к другу)", sets: 4, rest: 120, id: "seateddb", desc: "Сядьте на скамью с вертикальной спинкой." },
        { name: "Разведение гантелей в стороны стоя", sets: 3, rest: 90, id: "laterals", desc: "Корпус слегка наклонен вперед." },
        { name: "Французский жим с гантелью сидя", sets: 3, rest: 90, id: "french", desc: "Гантель над головой." },
        { name: "Разгибание рук на блоке (канат)", sets: 3, rest: 60, id: "pushdown", desc: "Локти прижаты к корпусу." }
    ]},
    2: { name: "День 2. Тяговый (спина, бицепс)", exercises: [
        { name: "Тяга штанги в наклоне", sets: 4, rest: 150, id: "bentrow", desc: "Наклон корпуса 45-60°, спина прямая." },
        { name: "Тяга верхнего блока к груди широким хватом", sets: 4, rest: 120, id: "latpulldown", desc: "Хват широкий." },
        { name: "Тяга гантели к поясу (с упором в скамью)", sets: 3, rest: 105, id: "dbrow", desc: "Упритесь рукой и коленом в скамью." },
        { name: "Тяга нижнего блока к поясу (узкий хват)", sets: 3, rest: 105, id: "seatedrow", desc: "Хват узкий." },
        { name: "Разведение гантелей в наклоне (задняя дельта)", sets: 3, rest: 90, id: "reardelt", desc: "Наклон до параллели с полом." },
        { name: "Сгибание рук со штангой EZ стоя", sets: 3, rest: 90, id: "ezcurl", desc: "Локти прижаты к корпусу." },
        { name: "Сгибание рук с гантелями (молот) стоя", sets: 3, rest: 90, id: "hammercurl", desc: "Ладони друг к другу." },
        { name: "Сгибание рук с канатом на нижнем блоке", sets: 3, rest: 90, id: "cablecurl", desc: "Ладони вниз." }
    ]},
    3: { name: "День 3. Ноги + кор", exercises: [
        { name: "Жим ногами платформы", sets: 4, rest: 150, id: "legpress", desc: "Ноги на ширине плеч." },
        { name: "Приседания с гантелью перед собой (Goblet squat)", sets: 4, rest: 150, id: "goblet", desc: "Гантель у груди." },
        { name: "Румынская тяга с гантелями", sets: 4, rest: 150, id: "romanian", desc: "Ноги на ширине таза." },
        { name: "Сгибание ног лежа", sets: 3, rest: 105, id: "legcurl", desc: "Согните ноги." },
        { name: "Разгибание ног сидя", sets: 3, rest: 105, id: "legext", desc: "Разогните ноги." },
        { name: "Скручивания на римском стуле", sets: 3, rest: 90, id: "crunch", desc: "Скручивайте корпус." },
        { name: "Гиперэкстензия с округлением спины", sets: 3, rest: 90, id: "hyper", desc: "Округлите спину, затем поднимитесь." }
    ]}
};

// ==================== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЬСКИХ УПРАЖНЕНИЙ ====================
let customExercises = JSON.parse(localStorage.getItem("custom_exercises") || "[]");

function getAllExercises(day) {
    let dayEx = [...PROGRAM[day].exercises];
    let customForDay = customExercises.filter(ex => ex.day === day);
    return [...dayEx, ...customForDay];
}

// ==================== ОСНОВНЫЕ ДАННЫЕ ====================
let currentTab = "workout";
let currentDay = 1;
let currentExIndex = 0;
let timer = null;
let timerSec = 0;

let logs = JSON.parse(localStorage.getItem("gym_logs") || "{}");
let workoutDays = JSON.parse(localStorage.getItem("gym_days") || "[]");
let maxWeight = JSON.parse(localStorage.getItem("gym_max_weight") || "{}");
let maxReps = JSON.parse(localStorage.getItem("gym_max_reps") || "{}");
let bodyWeight = JSON.parse(localStorage.getItem("gym_body_weight") || "[]");
let bodyMeasure = JSON.parse(localStorage.getItem("gym_measure") || '{"chest":[],"biceps":[],"waist":[],"thigh":[]}');
let progressPhotos = JSON.parse(localStorage.getItem("progress_photos") || "[]");
let exercisePhotos = JSON.parse(localStorage.getItem("exercise_photos") || "{}");

function saveAll() {
    localStorage.setItem("gym_logs", JSON.stringify(logs));
    localStorage.setItem("gym_days", JSON.stringify(workoutDays));
    localStorage.setItem("gym_max_weight", JSON.stringify(maxWeight));
    localStorage.setItem("gym_max_reps", JSON.stringify(maxReps));
    localStorage.setItem("gym_body_weight", JSON.stringify(bodyWeight));
    localStorage.setItem("gym_measure", JSON.stringify(bodyMeasure));
    localStorage.setItem("progress_photos", JSON.stringify(progressPhotos));
    localStorage.setItem("exercise_photos", JSON.stringify(exercisePhotos));
    localStorage.setItem("custom_exercises", JSON.stringify(customExercises));
}

function getToday() { return new Date().toISOString().slice(0,10); }
function getWeekAgo() { let d = new Date(); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); }
function stopTimer() { if(timer) clearInterval(timer); timer = null; timerSec = 0; if(currentTab==="workout") render(); }
function startTimer(sec) { stopTimer(); timerSec = sec; timer = setInterval(() => { if(timerSec<=1){ stopTimer(); alert("⏰ Отдых закончен!"); } else { timerSec--; if(currentTab==="workout") render(); } }, 1000); render(); }

function markWorkout() {
    let today = getToday();
    if(!workoutDays.includes(today)) {
        workoutDays.push(today);
        saveAll();
        alert("✅ Тренировка отмечена в календаре!");
    } else {
        alert("📅 Тренировка за сегодня уже отмечена");
    }
}

function updateSet(exId, setIdx, w, r) {
    let today = getToday();
    if(!logs[today]) logs[today] = {};
    if(!logs[today][exId]) logs[today][exId] = [];
    logs[today][exId][setIdx] = { weight: w, reps: r };
    let wNum = parseFloat(w), rNum = parseFloat(r);
    if(!isNaN(wNum) && wNum > (maxWeight[exId]||0)) maxWeight[exId] = wNum;
    if(!isNaN(rNum) && rNum > (maxReps[exId]||0)) maxReps[exId] = rNum;
    saveAll();
    if(currentTab==="workout") render();
}

function getMaxWeightLastWeek(exId) {
    let weekAgo = getWeekAgo();
    let maxW = 0;
    let exData = logs[weekAgo]?.[exId] || [];
    exData.forEach(s => { let w = parseFloat(s.weight); if(!isNaN(w) && w > maxW) maxW = w; });
    return maxW;
}

function getMaxRepsLastWeek(exId) {
    let weekAgo = getWeekAgo();
    let maxR = 0;
    let exData = logs[weekAgo]?.[exId] || [];
    exData.forEach(s => { let r = parseFloat(s.reps); if(!isNaN(r) && r > maxR) maxR = r; });
    return maxR;
}

// ==================== СВАЙП ====================
let touchStartX = 0, touchEndX = 0;
function handleSwipe() {
    if(currentTab !== "workout") return;
    let dayExercises = getAllExercises(currentDay);
    if(touchEndX < touchStartX - 50) {
        if(currentExIndex + 1 < dayExercises.length) {
            currentExIndex++;
            stopTimer();
            render();
        }
    }
    if(touchEndX > touchStartX + 50) {
        if(currentExIndex > 0) {
            currentExIndex--;
            stopTimer();
            render();
        }
    }
}

// ==================== ОТРИСОВКА ====================
function render() {
    if(currentTab === "workout") renderWorkout();
    else if(currentTab === "progress") renderProgress();
    else if(currentTab === "calendar") renderCalendar();
    else if(currentTab === "measure") renderMeasure();
    else if(currentTab === "weight") renderWeight();
    else if(currentTab === "photos") renderPhotos();
    else if(currentTab === "exercises") renderExercises();
    else renderSettings();
    
    document.querySelectorAll(".nav-btn").forEach(btn => {
        if(btn.dataset.tab === currentTab) btn.classList.add("active");
        else btn.classList.remove("active");
    });
}

function renderWorkout() {
    let dayExercises = getAllExercises(currentDay);
    if(dayExercises.length === 0) {
        document.getElementById("app").innerHTML = `<div class="card"><div class="section-title">Нет упражнений на день ${currentDay}</div><button class="btn-primary" onclick="currentTab='exercises'; render()">➕ Добавить упражнения</button></div>`;
        return;
    }
    
    let ex = dayExercises[currentExIndex];
    let today = getToday();
    let setsData = logs[today]?.[ex.id] || [];
    let exPhoto = exercisePhotos[ex.id];
    let bestW = maxWeight[ex.id] || 0;
    let bestR = maxReps[ex.id] || 0;
    let lastWeekW = getMaxWeightLastWeek(ex.id);
    let lastWeekR = getMaxRepsLastWeek(ex.id);
    
    let timerHtml = "";
    if(timer) { let m = Math.floor(timerSec/60), s = timerSec%60; timerHtml = `<div class="card" style="background:#1f2a1f; text-align:center">⏱️ Отдых: ${m}:${s<10?'0'+s:s}<button onclick="stopTimer()" style="margin-left:10px">Стоп</button></div>`; }
    
    let photoHtml = "";
    if(exPhoto) { photoHtml = `<div><img src="${exPhoto}" class="exercise-photo" onclick="viewPhoto('${exPhoto}')"><button onclick="deleteExercisePhoto('${ex.id}')" style="margin-top:8px; background:#4a1e2c; width:100%">🗑️ Удалить фото</button></div>`; }
    
    let setsHtml = "";
    for(let i=0; i<ex.sets; i++) {
        let s = setsData[i] || { weight: "", reps: "" };
        setsHtml += `<div class="set-row">
            <span>Подход ${i+1}</span>
            <input type="number" id="w_${i}" value="${s.weight}" placeholder="кг">
            <input type="number" id="r_${i}" value="${s.reps}" placeholder="повт">
            <button onclick="startTimer(${ex.rest})">⏱️ ${Math.floor(ex.rest/60)}:${(ex.rest%60).toString().padStart(2,'0')}</button>
        </div>`;
    }
    
    let html = `<div class="card swipe-area" id="swipeArea">
        <div class="flex-between"><span class="section-title">${PROGRAM[currentDay].name}</span>
        <select id="daySelect"><option value="1">День 1</option><option value="2">День 2</option><option value="3">День 3</option></select></div>
        <div class="stats-panel">📊 <strong>ТВОИ РЕКОРДЫ</strong><br>🏆 Макс. вес: ${bestW} кг (неделю назад: ${lastWeekW} кг)<br>🏆 Макс. повторения: ${bestR} (неделю назад: ${lastWeekR})</div>
        <div style="background:#0f1219; border-radius:24px; padding:16px;">
            <div class="flex-between"><div style="font-size:18px; font-weight:bold;">🏋️ ${ex.name}</div><button onclick="addPhotoToExercise('${ex.id}')">📸 Фото</button></div>
            <div style="font-size:12px; color:#8e96a6; margin:8px 0;">📖 ${ex.desc}</div>
            ${photoHtml}
            ${setsHtml}
            ${timerHtml}
            <button class="btn-primary" id="completeEx">✓ Завершить упражнение</button>
        </div>
        <div style="display:flex; gap:12px; margin-top:16px;"><button id="prevEx" ${currentExIndex===0?'disabled':''}>◀ Назад</button><button id="nextEx" ${currentExIndex===dayExercises.length-1?'disabled':''}>Вперёд ▶</button></div>
        <button class="btn-primary" id="finishWorkoutBtn" style="margin-top:16px; background:#2a2f3c;">✅ Завершить тренировку (отметить в календаре)</button>
        <div style="text-align:center; margin-top:8px; font-size:11px; color:#8e96a6;">👆 Свайп влево/вправо</div>
    </div>`;
    
    document.getElementById("app").innerHTML = html;
    
    let swipeArea = document.getElementById("swipeArea");
    if(swipeArea) {
        swipeArea.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; });
        swipeArea.addEventListener("touchend", (e) => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); });
    }
    
    document.getElementById("daySelect").value = currentDay;
    document.getElementById("daySelect").onchange = (e) => { currentDay = parseInt(e.target.value); currentExIndex = 0; stopTimer(); render(); };
    
    for(let i=0; i<ex.sets; i++) {
        let w = document.getElementById(`w_${i}`), r = document.getElementById(`r_${i}`);
        if(w) w.onchange = (e) => updateSet(ex.id, i, e.target.value, r?.value || "");
        if(r) r.onchange = (e) => updateSet(ex.id, i, w?.value || "", e.target.value);
    }
    
    document.getElementById("prevEx").onclick = () => { if(currentExIndex > 0) { currentExIndex--; stopTimer(); render(); } };
    document.getElementById("nextEx").onclick = () => { if(currentExIndex+1 < dayExercises.length) { currentExIndex++; stopTimer(); render(); } };
    document.getElementById("completeEx").onclick = () => {
        let all = true;
        for(let i=0; i<ex.sets; i++) {
            let d = logs[getToday()]?.[ex.id]?.[i];
            if(!d || !d.weight || !d.reps) all = false;
        }
        if(!all) alert("Заполни все подходы!");
        else if(currentExIndex+1 < dayExercises.length) { currentExIndex++; stopTimer(); render(); }
        else alert("✅ Все упражнения дня завершены! Нажмите кнопку ниже, чтобы отметить тренировку.");
    };
    document.getElementById("finishWorkoutBtn").onclick = () => { markWorkout(); };
}

function renderProgress() {
    let html = `<div class="card"><div class="section-title">📊 Прогресс по упражнениям</div>`;
    for(let day of [1,2,3]) {
        for(let ex of PROGRAM[day].exercises) {
            let bestW = maxWeight[ex.id] || 0;
            let bestR = maxReps[ex.id] || 0;
            let lastWeekW = getMaxWeightLastWeek(ex.id);
            let lastWeekR = getMaxRepsLastWeek(ex.id);
            html += `<div class="exercise-item"><div><strong>${ex.name}</strong></div><div class="flex-between"><span>🏆 макс. вес:</span><span>${bestW} кг (неделю назад: ${lastWeekW} кг)</span></div><div class="flex-between"><span>🏆 макс. повторения:</span><span>${bestR} (неделю назад: ${lastWeekR})</span></div></div>`;
        }
    }
    for(let ex of customExercises) {
        let bestW = maxWeight[ex.id] || 0;
        let bestR = maxReps[ex.id] || 0;
        let lastWeekW = getMaxWeightLastWeek(ex.id);
        let lastWeekR = getMaxRepsLastWeek(ex.id);
        html += `<div class="exercise-item"><div><strong>${ex.name}</strong> ✏️</div><div class="flex-between"><span>🏆 макс. вес:</span><span>${bestW} кг (неделю назад: ${lastWeekW} кг)</span></div><div class="flex-between"><span>🏆 макс. повторения:</span><span>${bestR} (неделю назад: ${lastWeekR})</span></div></div>`;
    }
    html += `</div>`;
    document.getElementById("app").innerHTML = html;
}

function renderCalendar() {
    let today = new Date(), y = today.getFullYear(), m = today.getMonth();
    let first = new Date(y,m,1), start = first.getDay()===0?6:first.getDay()-1, daysInMonth = new Date(y,m+1,0).getDate();
    let days = []; for(let i=0;i<start;i++) days.push(null); for(let i=1;i<=daysInMonth;i++) days.push(i);
    let cal = `<div class="calendar">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div style="color:#ffb347">${d}</div>`).join('')}`;
    days.forEach(day => {
        if(day === null) cal += `<div></div>`;
        else {
            let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            let has = workoutDays.includes(dateStr);
            let isToday = (today.getDate()===day && today.getMonth()===m && today.getFullYear()===y);
            cal += `<div class="calendar-day ${has?'workout':''} ${isToday?'today':''}" onclick="alert('${dateStr}: ${has?"✅ тренировка":"❌ отдых"}')">${day}</div>`;
        }
    });
    cal += `</div><button class="btn-primary" id="goToday" style="margin-top:16px;">🏋️ Сегодняшняя тренировка</button>`;
    document.getElementById("app").innerHTML = `<div class="card"><div class="section-title">📅 Календарь</div>${cal}</div>`;
    document.getElementById("goToday")?.addEventListener("click",()=>{ currentTab="workout"; render(); });
}

function renderMeasure() {
    let measures = {Грудь:"chest", Бицепс:"biceps", Талия:"waist", Бедро:"thigh"};
    let html = `<div class="card"><div class="section-title">📏 Замеры тела (см)</div>`;
    for(let [name,key] of Object.entries(measures)) {
        let last = bodyMeasure[key][bodyMeasure[key].length-1] || null;
        html += `<div class="flex-between" style="background:#1a1e28; padding:12px; border-radius:40px; margin:8px 0;"><span>${name}</span><span><strong>${last ? last.value + ' см (' + last.date + ')' : '—'}</strong></span><button onclick="addMeasure('${key}','${name}')">+</button></div>`;
    }
    html += `<button class="btn-primary" id="measHistory">📊 История</button></div>`;
    document.getElementById("app").innerHTML = html;
    document.getElementById("measHistory")?.addEventListener("click",()=>{
        let msg="📏 История замеров:\n";
        for(let [name,key] of Object.entries(measures)) { msg+=`\n${name}: `; bodyMeasure[key].forEach(m=>msg+=`${m.date} ${m.value}см | `); }
        alert(msg);
    });
}

function renderWeight() {
    let last = bodyWeight[bodyWeight.length-1] || null;
    let html = `<div class="card"><div class="section-title">⚖️ Вес тела</div><div class="flex-between" style="background:#1a1e28; padding:12px; border-radius:40px;"><span>Текущий вес:</span><span><strong>${last ? last.weight + ' кг (' + last.date + ')' : '—'}</strong></span><button onclick="addWeight()">+</button></div><button class="btn-primary" id="weightHistory">📈 История</button></div>`;
    document.getElementById("app").innerHTML = html;
    document.getElementById("weightHistory")?.addEventListener("click",()=>{
        let msg="📈 История веса:\n"; bodyWeight.forEach(w=>msg+=`${w.date}: ${w.weight} кг\n`); alert(msg);
    });
}

// ========== ФОТО ПРОГРЕССА ==========
function renderPhotos() {
    let html = `<div class="card"><div class="section-title">📸 Фото прогресса</div><button class="btn-primary" id="addPhotoBtn" style="margin-bottom:16px;">➕ Добавить фото</button></div>`;
    if(progressPhotos.length === 0) html += `<div class="card" style="text-align:center;">Нет фото. Нажмите "Добавить фото"</div>`;
    for(let i=0; i<progressPhotos.length; i++) {
        let p = progressPhotos[i];
        html += `<div class="photo-item"><div class="flex-between"><span>📅 ${p.date} ${p.comment ? '— ' + p.comment : ''}</span><button onclick="deleteProgressPhoto(${i})" style="background:#4a1e2c;">🗑️</button></div><img src="${p.data}" class="photo-img" onclick="viewPhoto('${p.data}')"></div>`;
    }
    document.getElementById("app").innerHTML = html;
    document.getElementById("addPhotoBtn")?.addEventListener("click", addProgressPhoto);
}

function addProgressPhoto() {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        let file = e.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = function(ev) {
                let comment = prompt("Комментарий к фото:", "Мой прогресс");
                progressPhotos.push({ date: getToday(), comment: comment || "", data: ev.target.result });
                saveAll();
                render();
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

function deleteProgressPhoto(idx) {
    if(confirm("Удалить фото?")) { progressPhotos.splice(idx,1); saveAll(); render(); }
}

// ========== УПРАЖНЕНИЯ ==========
function renderExercises() {
    let html = `<div class="card"><div class="section-title">📝 Мои упражнения</div><button class="btn-primary" id="addExerciseBtn">➕ Добавить своё упражнение</button></div>`;
    
    for(let day of [1,2,3]) {
        html += `<div style="margin-top:16px;"><strong>${PROGRAM[day].name}</strong></div>`;
        for(let ex of PROGRAM[day].exercises) {
            let exPhoto = exercisePhotos[ex.id];
            html += `<div class="exercise-item"><div class="flex-between"><strong>${ex.name}</strong></div><div>${ex.sets} подходов | Отдых ${ex.rest}с</div><div style="font-size:12px; color:#8e96a6;">📖 ${ex.desc}</div>`;
            if(exPhoto) {
                html += `<img src="${exPhoto}" class="exercise-photo" onclick="viewPhoto('${exPhoto}')"><button onclick="deleteExercisePhoto('${ex.id}')" style="margin-top:8px; background:#4a1e2c;">🗑️ Удалить фото</button>`;
            } else {
                html += `<button onclick="addPhotoToExercise('${ex.id}')" style="margin-top:8px;">📸 Добавить фото</button>`;
            }
            html += `</div>`;
        }
    }
    
    if(customExercises.length > 0) {
        html += `<div style="margin-top:16px;"><strong>⚡ МОИ ДОБАВЛЕННЫЕ УПРАЖНЕНИЯ</strong></div>`;
        for(let ex of customExercises) {
            let exPhoto = exercisePhotos[ex.id];
            html += `<div class="exercise-item"><div class="flex-between"><strong>${ex.name}</strong><button onclick="deleteCustomExercise('${ex.id}')" style="background:#4a1e2c;">🗑️</button></div><div>День ${ex.day} | ${ex.sets} подходов | Отдых ${ex.rest}с</div><div style="font-size:12px; color:#8e96a6;">📖 ${ex.desc}</div>`;
            if(exPhoto) {
                html += `<img src="${exPhoto}" class="exercise-photo" onclick="viewPhoto('${exPhoto}')"><button onclick="deleteExercisePhoto('${ex.id}')" style="margin-top:8px; background:#4a1e2c;">🗑️ Удалить фото</button>`;
            } else {
                html += `<button onclick="addPhotoToExercise('${ex.id}')" style="margin-top:8px;">📸 Добавить фото</button>`;
            }
            html += `</div>`;
        }
    }
    
    document.getElementById("app").innerHTML = html;
    document.getElementById("addExerciseBtn")?.addEventListener("click", addCustomExercise);
}

function addCustomExercise() {
    let name = prompt("Название упражнения:");
    if(!name) return;
    let day = parseInt(prompt("В какой день добавить? (1, 2 или 3):", "1"));
    if(isNaN(day) || day < 1 || day > 3) day = 1;
    let sets = parseInt(prompt("Количество подходов:", "3"));
    if(isNaN(sets)) sets = 3;
    let rest = parseInt(prompt("Отдых между подходами (секунд):", "90"));
    if(isNaN(rest)) rest = 90;
    let desc = prompt("Описание/техника выполнения:", "");
    let id = "custom_" + Date.now();
    customExercises.push({ id, name, day, sets, rest, desc });
    saveAll();
    render();
}

function deleteCustomExercise(id) {
    if(confirm("Удалить упражнение?")) {
        customExercises = customExercises.filter(ex => ex.id !== id);
        saveAll();
        render();
    }
}

function renderSettings() {
    document.getElementById("app").innerHTML = `<div class="card"><div class="section-title">⚙️ Настройки</div><button class="btn-primary" id="resetBtn" style="background:#4a1e2c;">🗑️ Сбросить ВСЕ данные</button><p style="margin-top:16px;">Все данные хранятся в памяти телефона.</p></div>`;
    document.getElementById("resetBtn")?.addEventListener("click", () => {
        if(confirm("Удалить всё?")) { localStorage.clear(); location.reload(); }
    });
}

// ==================== ГЛОБАЛЬНЫЕ ФУНКЦИИ ====================
window.stopTimer = stopTimer;
window.startTimer = startTimer;

window.addPhotoToExercise = (exId) => {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        let file = e.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                exercisePhotos[exId] = ev.target.result;
                saveAll();
                render();
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
};

window.deleteExercisePhoto = (exId) => {
    if(confirm("Удалить фото упражнения?")) {
        delete exercisePhotos[exId];
        saveAll();
        render();
    }
};

window.addMeasure = (key, name) => {
    let val = parseFloat(prompt(`${name} (см):`));
    if(!isNaN(val)) {
        bodyMeasure[key].push({ date: getToday(), value: val });
        saveAll();
        render();
    }
};

window.addWeight = () => {
    let w = parseFloat(prompt("Вес (кг):"));
    if(!isNaN(w)) {
        bodyWeight.push({ date: getToday(), weight: w });
        saveAll();
        render();
    }
};

window.viewPhoto = (url) => {
    let modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;';
    modal.innerHTML = `<img src="${url}" style="max-width:90%;max-height:80%;object-fit:contain;border-radius:20px;"><button onclick="this.parentElement.remove()" style="margin-top:20px;background:#ffb347;padding:10px 20px;">Закрыть</button>`;
    document.body.appendChild(modal);
};

window.deleteProgressPhoto = deleteProgressPhoto;
window.deleteCustomExercise = deleteCustomExercise;

document.getElementById("nav").addEventListener("click", (e) => {
    let btn = e.target.closest(".nav-btn");
    if(btn && btn.dataset.tab) { currentTab = btn.dataset.tab; stopTimer(); render(); }
});

render();
</script>
</body>
</html>
