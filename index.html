<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GYM PRO — Твой дневник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Адаптация под все устройства */
        html { font-size: 16px; }
        body { 
            background: #0a0c0f; 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; 
            color: #eef2ff; 
            min-height: 100vh;
        }
        
        /* Центрирование контента */
        .app-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px 16px 90px; 
        }
        
        /* Для планшетов и ПК — шире */
        @media (min-width: 768px) {
            .app-container { padding: 24px 24px 100px; }
            .bottom-nav { max-width: 1200px; padding: 12px 24px 24px; }
            .nav-btn { font-size: 13px; padding: 8px 16px; }
            .nav-icon { font-size: 22px; }
            .set-row { padding: 16px; }
            input, select, button { font-size: 16px; }
        }
        
        @media (min-width: 1024px) {
            .app-container { padding: 32px 32px 100px; }
            .card { padding: 24px; }
        }
        
        /* Навигация */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            margin: 0 auto; 
            background: #111417e6; 
            backdrop-filter: blur(20px); 
            display: flex; 
            justify-content: center; 
            gap: 4px;
            flex-wrap: wrap;
            padding: 8px 12px 20px; 
            border-top: 0.5px solid #2a2f38; 
            z-index: 100; 
        }
        
        @media (min-width: 768px) {
            .bottom-nav { gap: 8px; }
        }
        
        .nav-btn { 
            background: none; 
            border: none; 
            color: #8e96a6; 
            font-size: 11px; 
            font-weight: 500; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 3px; 
            padding: 6px 10px; 
            border-radius: 40px; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        
        .nav-btn.active { color: #ffb347; background: #1e1f2c; }
        .nav-icon { font-size: 18px; }
        
        /* Карточки */
        .card { 
            background: #12151c; 
            border-radius: 28px; 
            padding: 18px 16px; 
            margin-bottom: 20px; 
            border: 1px solid #262c34; 
        }
        
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        /* Тренировка */
        .set-row { 
            background: #1a1e28; 
            border-radius: 20px; 
            padding: 12px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        
        input, select { 
            background: #0b0e14; 
            border: none; 
            color: white; 
            width: 65px; 
            padding: 8px 10px; 
            border-radius: 30px; 
            text-align: center; 
            font-size: 14px;
        }
        
        button { 
            background: #2a2f3c; 
            border: none; 
            padding: 8px 14px; 
            border-radius: 40px; 
            color: white; 
            cursor: pointer; 
            transition: opacity 0.2s;
            font-size: 13px;
        }
        
        button:active { opacity: 0.7; }
        .btn-primary { background: #ffb347; color: #0a0c0f; font-weight: bold; width: 100%; padding: 12px; }
        
        /* Календарь */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; margin-top: 12px; }
        .calendar-day { background: #1a1e28; padding: 10px 5px; border-radius: 30px; cursor: pointer; font-size: 14px; }
        .calendar-day.workout { background: #ffb347; color: #0a0c0f; font-weight: bold; }
        
        /* Фото */
        .photo-item { background: #1a1e28; border-radius: 20px; padding: 12px; margin-bottom: 16px; }
        .photo-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 16px; margin-top: 8px; cursor: pointer; background: #0a0c0f; }
        .exercise-photo { width: 100%; max-height: 200px; object-fit: cover; border-radius: 16px; margin-top: 8px; cursor: pointer; }
        
        /* Замеры */
        .metric-row { background: #1a1e28; border-radius: 40px; padding: 12px 16px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        /* Прогресс */
        .progress-item { background: #1a1e28; border-radius: 20px; padding: 12px; margin-top: 12px; }
        
        hr { border-color: #2a2f38; margin: 12px 0; }
        
        /* Адаптация для маленьких экранов */
        @media (max-width: 480px) {
            .nav-btn { padding: 4px 6px; font-size: 9px; }
            .nav-icon { font-size: 16px; }
            .set-row { flex-direction: column; align-items: stretch; }
            .set-row > div { justify-content: center; }
            input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>
<div class="bottom-nav" id="nav">
    <button class="nav-btn active" data-tab="workout">🏋️ Тренировка</button>
    <button class="nav-btn" data-tab="progress">📈 Прогресс</button>
    <button class="nav-btn" data-tab="calendar">📅 Календарь</button>
    <button class="nav-btn" data-tab="measure">📏 Замеры</button>
    <button class="nav-btn" data-tab="weight">⚖️ Вес</button>
    <button class="nav-btn" data-tab="photos">📸 Фото</button>
    <button class="nav-btn" data-tab="exercises">📝 Упражнения</button>
    <button class="nav-btn" data-tab="settings">⚙️ Настройки</button>
</div>

<script>
// ==================== ПРОГРАММА ====================
const PROGRAM = {
    1: { name: "День 1. Жимовый", exercises: [
        { name: "Жим гантелей лежа", sets: 4, rest: 120, id: "bench" },
        { name: "Жим гантелей на наклонной", sets: 3, rest: 120, id: "incline" },
        { name: "Разводка гантелей", sets: 3, rest: 90, id: "fly" }
    ]},
    2: { name: "День 2. Тяговый", exercises: [
        { name: "Тяга штанги в наклоне", sets: 4, rest: 120, id: "row" },
        { name: "Тяга верхнего блока", sets: 4, rest: 120, id: "lat" },
        { name: "Сгибание рук со штангой", sets: 3, rest: 90, id: "curl" }
    ]},
    3: { name: "День 3. Ноги", exercises: [
        { name: "Приседания", sets: 4, rest: 150, id: "squat" },
        { name: "Жим ногами", sets: 4, rest: 150, id: "legpress" },
        { name: "Румынская тяга", sets: 3, rest: 120, id: "rdl" }
    ]}
};

// ==================== ДАННЫЕ ====================
let currentTab = "workout";
let currentDay = 1;
let currentExIndex = 0;
let timer = null;
let timerSec = 0;

// Загружаем данные
let logs = JSON.parse(localStorage.getItem("gym_logs")) || {};
let workoutDays = JSON.parse(localStorage.getItem("gym_days")) || [];
let maxWeight = JSON.parse(localStorage.getItem("gym_max_weight")) || {};
let maxReps = JSON.parse(localStorage.getItem("gym_max_reps")) || {};
let bodyWeight = JSON.parse(localStorage.getItem("gym_body_weight")) || [];
let bodyMeasure = JSON.parse(localStorage.getItem("gym_measure")) || { chest: [], biceps: [], waist: [], thigh: [] };
let photos = JSON.parse(localStorage.getItem("gym_photos")) || [];
let exercisePhotos = JSON.parse(localStorage.getItem("gym_exercise_photos")) || {};
let customExercises = JSON.parse(localStorage.getItem("gym_custom_ex")) || [];

function saveAll() {
    localStorage.setItem("gym_logs", JSON.stringify(logs));
    localStorage.setItem("gym_days", JSON.stringify(workoutDays));
    localStorage.setItem("gym_max_weight", JSON.stringify(maxWeight));
    localStorage.setItem("gym_max_reps", JSON.stringify(maxReps));
    localStorage.setItem("gym_body_weight", JSON.stringify(bodyWeight));
    localStorage.setItem("gym_measure", JSON.stringify(bodyMeasure));
    localStorage.setItem("gym_photos", JSON.stringify(photos));
    localStorage.setItem("gym_exercise_photos", JSON.stringify(exercisePhotos));
    localStorage.setItem("gym_custom_ex", JSON.stringify(customExercises));
}

function getToday() { return new Date().toISOString().slice(0,10); }
function getWeekAgo() { let d = new Date(); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); }

function stopTimer() { if(timer) clearInterval(timer); timer = null; timerSec = 0; if(currentTab==="workout") render(); }
function startTimer(sec) { stopTimer(); timerSec = sec; timer = setInterval(() => { if(timerSec<=1){ stopTimer(); alert("⏰ Отдых закончен!"); } else { timerSec--; if(currentTab==="workout") render(); } }, 1000); render(); }

function markWorkout() { let t=getToday(); if(!workoutDays.includes(t)) { workoutDays.push(t); saveAll(); } }

function updateSet(day, exId, setIdx, w, r) {
    let today = getToday();
    if(!logs[today]) logs[today] = {};
    if(!logs[today][day]) logs[today][day] = {};
    if(!logs[today][day][exId]) logs[today][day][exId] = [];
    logs[today][day][exId][setIdx] = { weight: w, reps: r };
    
    let wNum = parseFloat(w), rNum = parseFloat(r);
    if(!isNaN(wNum) && wNum > (maxWeight[exId]||0)) maxWeight[exId] = wNum;
    if(!isNaN(rNum) && rNum > (maxReps[exId]||0)) maxReps[exId] = rNum;
    saveAll();
    if(currentTab==="workout") render();
}

function getTonnage(date, day, exId) {
    let total = 0;
    let exData = logs[date]?.[day]?.[exId] || [];
    exData.forEach(s => { let vol = parseFloat(s.weight)*parseFloat(s.reps); if(!isNaN(vol)) total += vol; });
    return total;
}

function getTotalTonnage(date) {
    let total = 0;
    if(!logs[date]) return 0;
    for(let d in logs[date]) {
        for(let exId in logs[date][d]) {
            let exData = logs[date][d][exId] || [];
            exData.forEach(s => { let vol = parseFloat(s.weight)*parseFloat(s.reps); if(!isNaN(vol)) total += vol; });
        }
    }
    return total;
}

function addPhotoToExercise(exId) {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        let file = e.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                exercisePhotos[exId] = ev.target.result;
                saveAll();
                render();
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

function deleteExercisePhoto(exId) {
    if(confirm("Удалить фото упражнения?")) {
        delete exercisePhotos[exId];
        saveAll();
        render();
    }
}

// ==================== ОТРИСОВКА ====================
function render() {
    if(currentTab === "workout") renderWorkout();
    else if(currentTab === "progress") renderProgress();
    else if(currentTab === "calendar") renderCalendar();
    else if(currentTab === "measure") renderMeasure();
    else if(currentTab === "weight") renderWeight();
    else if(currentTab === "photos") renderPhotos();
    else if(currentTab === "exercises") renderExercises();
    else renderSettings();
    
    document.querySelectorAll(".nav-btn").forEach(btn => {
        if(btn.dataset.tab === currentTab) btn.classList.add("active");
        else btn.classList.remove("active");
    });
}

function renderWorkout() {
    let day = PROGRAM[currentDay];
    let ex = day.exercises[currentExIndex];
    let today = getToday();
    let setsData = logs[today]?.[currentDay]?.[ex.id] || [];
    let exPhoto = exercisePhotos[ex.id];
    
    let timerHtml = "";
    if(timer) { let m = Math.floor(timerSec/60), s = timerSec%60; timerHtml = `<div class="card" style="background:#1f2a1f; text-align:center">⏱️ Отдых: ${m}:${s<10?'0'+s:s}<button onclick="stopTimer()" style="margin-left:10px">Стоп</button></div>`; }
    
    let photoHtml = "";
    if(exPhoto) {
        photoHtml = `<div style="margin-top:12px;">
            <img src="${exPhoto}" class="exercise-photo" onclick="viewPhoto('${exPhoto}')">
            <button onclick="deleteExercisePhoto('${ex.id}')" style="margin-top:8px; background:#4a1e2c; width:100%">🗑️ Удалить фото</button>
        </div>`;
    }
    
    let setsHtml = "";
    for(let i=0; i<ex.sets; i++) {
        let s = setsData[i] || { weight: "", reps: "" };
        setsHtml += `<div class="set-row">
            <span style="min-width:70px">Подход ${i+1}</span>
            <input type="number" id="w_${i}" value="${s.weight}" placeholder="кг" style="width:80px">
            <input type="number" id="r_${i}" value="${s.reps}" placeholder="повт" style="width:80px">
            <button onclick="startTimer(${ex.rest})">⏱️ ${Math.floor(ex.rest/60)}:${(ex.rest%60).toString().padStart(2,'0')}</button>
        </div>`;
    }
    
    let html = `<div class="card">
        <div class="flex-between"><span class="section-title">💪 ${day.name}</span>
        <select id="daySelect"><option value="1">День 1 Жим</option><option value="2">День 2 Тяга</option><option value="3">День 3 Ноги</option></select></div>
        <div style="background:#0f1219; border-radius:24px; padding:16px; border-left:3px solid #ffb347;">
            <div class="flex-between" style="flex-wrap:wrap; gap:10px; margin-bottom:12px;">
                <div style="font-size:18px; font-weight:bold;">🏋️ ${ex.name}</div>
                <div style="display:flex; gap:8px;">
                    <button onclick="addPhotoToExercise('${ex.id}')" style="background:#2a2f3c;">📸 Добавить фото</button>
                </div>
            </div>
            ${photoHtml}
            ${setsHtml}
            ${timerHtml}
            <button class="btn-primary" id="completeEx">✓ Завершить упражнение</button>
        </div>
        <div style="display:flex; gap:12px; margin-top:16px;">
            <button id="prevEx" ${currentExIndex===0?'disabled':''}>◀ Назад</button>
            <button id="nextEx" ${currentExIndex===day.exercises.length-1?'disabled':''}>Вперёд ▶</button>
        </div>
    </div>`;
    document.getElementById("app").innerHTML = html;
    
    document.getElementById("daySelect").value = currentDay;
    document.getElementById("daySelect").onchange = (e) => { currentDay = parseInt(e.target.value); currentExIndex = 0; stopTimer(); render(); };
    
    for(let i=0; i<ex.sets; i++) {
        let w = document.getElementById(`w_${i}`), r = document.getElementById(`r_${i}`);
        if(w) w.onchange = (e) => updateSet(currentDay, ex.id, i, e.target.value, r?.value || "");
        if(r) r.onchange = (e) => updateSet(currentDay, ex.id, i, w?.value || "", e.target.value);
    }
    
    document.getElementById("prevEx").onclick = () => { if(currentExIndex>0) { currentExIndex--; stopTimer(); render(); } };
    document.getElementById("nextEx").onclick = () => {
        if(currentExIndex+1 < day.exercises.length) { currentExIndex++; stopTimer(); render(); }
        else { markWorkout(); alert("🎉 Тренировка завершена! Молодец!"); }
    };
    document.getElementById("completeEx").onclick = () => {
        let all = true;
        for(let i=0; i<ex.sets; i++) {
            let d = logs[getToday()]?.[currentDay]?.[ex.id]?.[i];
            if(!d || !d.weight || !d.reps) all = false;
        }
        if(!all) alert("Заполни вес и повторения для всех подходов!");
        else if(currentExIndex+1 < day.exercises.length) { currentExIndex++; stopTimer(); render(); }
        else { markWorkout(); alert("✅ Тренировка дня завершена!"); }
    };
}

function renderProgress() {
    let today = getToday();
    let weekAgo = getWeekAgo();
    let totalToday = getTotalTonnage(today);
    let totalWeek = getTotalTonnage(weekAgo);
    let diffTotal = totalToday - totalWeek;
    
    let html = `<div class="card"><div class="section-title">📊 Прогресс</div>
        <div class="flex-between"><span>💪 Тоннаж сегодня:</span><strong>${Math.round(totalToday)} кг</strong></div>
        <div class="flex-between"><span>📆 Тоннаж неделю назад:</span><strong>${Math.round(totalWeek)} кг</strong></div>
        <div class="flex-between"><span>📈 Динамика:</span><strong style="color:#ffb347">${diffTotal>0?'+':''}${Math.round(diffTotal)} кг</strong></div>
        <hr>`;
    
    for(let day of [1,2,3]) {
        for(let ex of PROGRAM[day].exercises) {
            let bestW = maxWeight[ex.id] || 0;
            let bestR = maxReps[ex.id] || 0;
            let tonnageToday = getTonnage(today, day, ex.id);
            let tonnageWeek = getTonnage(weekAgo, day, ex.id);
            let exDiff = tonnageToday - tonnageWeek;
            html += `<div class="progress-item">
                <div><strong>${ex.name}</strong></div>
                <div class="flex-between"><span>🏆 макс. вес:</span><span>${bestW} кг</span></div>
                <div class="flex-between"><span>🏆 макс. повторы:</span><span>${bestR}</span></div>
                <div class="flex-between"><span>📊 тоннаж сегодня:</span><span>${Math.round(tonnageToday)} кг</span></div>
                <div class="flex-between"><span>📊 тоннаж неделю назад:</span><span>${Math.round(tonnageWeek)} кг</span></div>
                <div class="flex-between"><span>📈 динамика:</span><span style="color:#ffb347">${exDiff>0?'+':''}${Math.round(exDiff)} кг</span></div>
            </div>`;
        }
    }
    html += `</div>`;
    document.getElementById("app").innerHTML = html;
}

function renderCalendar() {
    let today = new Date();
    let y = today.getFullYear(), m = today.getMonth();
    let first = new Date(y,m,1);
    let start = first.getDay()===0?6:first.getDay()-1;
    let daysInMonth = new Date(y,m+1,0).getDate();
    let days = [];
    for(let i=0;i<start;i++) days.push(null);
    for(let i=1;i<=daysInMonth;i++) days.push(i);
    let cal = `<div class="calendar">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div style="color:#ffb347">${d}</div>`).join('')}`;
    days.forEach(day => {
        if(day===null) cal += `<div></div>`;
        else {
            let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            let has = workoutDays.includes(dateStr);
            cal += `<div class="calendar-day ${has?'workout':''}" onclick="alert('${dateStr}: ${has?"✅ тренировка была":"❌ отдых"}')">${day}</div>`;
        }
    });
    cal += `</div><button class="btn-primary" id="goToday" style="margin-top:16px;">🏋️ Сегодняшняя тренировка</button>`;
    document.getElementById("app").innerHTML = `<div class="card"><div class="section-title">📅 Календарь</div>${cal}</div>`;
    document.getElementById("goToday")?.addEventListener("click",()=>{ currentTab="workout"; render(); });
}

function renderMeasure() {
    let measures = {Грудь:"chest", Бицепс:"biceps", Талия:"waist", Бедро:"thigh"};
    let html = `<div class="card"><div class="section-title">📏 Замеры (см)</div>`;
    for(let [name,key] of Object.entries(measures)) {
        let last = bodyMeasure[key][bodyMeasure[key].length-1]?.value || "—";
        html += `<div class="metric-row"><span>${name}</span><span><strong>${last}</strong> см</span><button onclick="addMeasure('${key}','${name}')">+ Записать</button></div>`;
    }
    html += `<button class="btn-primary" id="measHistory">📊 История замеров</button></div>`;
    document.getElementById("app").innerHTML = html;
    document.getElementById("measHistory")?.addEventListener("click",()=>{
        let msg="📏 История замеров:\n";
        for(let [name,key] of Object.entries(measures)) {
            msg+=`\n${name}: `;
            bodyMeasure[key].slice(-5).forEach(m=>msg+=`${m.date} ${m.value}см | `);
        }
        alert(msg);
    });
}

function renderWeight() {
    let last = bodyWeight[bodyWeight.length-1]?.weight || "—";
    let html = `<div class="card"><div class="section-title">⚖️ Вес тела</div>
        <div class="metric-row"><span>Текущий вес:</span><strong>${last} кг</strong><button onclick="addWeight()">+ Записать</button></div>
        <button class="btn-primary" id="weightHistory">📈 История веса</button>
    </div>`;
    document.getElementById("app").innerHTML = html;
    document.getElementById("weightHistory")?.addEventListener("click",()=>{
        let msg="📈 История веса:\n";
        bodyWeight.slice(-10).forEach(w=>msg+=`${w.date}: ${w.weight} кг\n`);
        alert(msg);
    });
}

function renderPhotos() {
    let html = `<div class="card"><div class="section-title">📸 Фото прогресса</div><button class="btn-primary" id="addPhotoBtn">➕ Добавить фото прогресса</button></div>`;
    if(photos.length === 0) {
        html += `<div class="card" style="text-align:center; color:#8e96a6;">Нет фото. Добавьте первое!</div>`;
    }
    for(let p of photos) {
        html += `<div class="photo-item">
            <div class="flex-between"><span>📅 ${p.date}</span><button onclick="deletePhoto('${p.id}')" style="background:#4a1e2c;">🗑️</button></div>
            <img src="${p.data}" class="photo-img" onclick="viewPhoto('${p.data}')">
            <div style="margin-top:8px;">${p.comment || ""}</div>
        </div>`;
    }
    document.getElementById("app").innerHTML = html;
    document.getElementById("addPhotoBtn")?.addEventListener("click",()=>{
        let inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/*';
        inp.onchange = (e) => {
            let f = e.target.files[0];
            if(f) {
                let r = new FileReader();
                r.onload = (ev) => {
                    let comment = prompt("Комментарий к фото:", "Мой прогресс");
                    photos.unshift({ id: Date.now(), date: getToday(), comment: comment || "", data: ev.target.result });
                    saveAll();
                    render();
                };
                r.readAsDataURL(f);
            }
        };
        inp.click();
    });
}

function renderExercises() {
    let html = `<div class="card"><div class="section-title">📝 Мои упражнения</div><button class="btn-primary" id="addExBtn">➕ Добавить своё упражнение</button>`;
    for(let i=0; i<customExercises.length; i++) {
        let ex = customExercises[i];
        let exPhoto = exercisePhotos[ex.id];
        html += `<div class="progress-item">
            <div class="flex-between"><strong>${ex.name}</strong><button onclick="deleteCustomEx(${i})" style="background:#4a1e2c;">🗑️</button></div>
            <div><small>${ex.sets} подходов, отдых ${ex.rest}с</small></div>`;
        if(exPhoto) {
            html += `<img src="${exPhoto}" class="exercise-photo" onclick="viewPhoto('${exPhoto}')" style="max-height:150px;">`;
            html += `<button onclick="deleteExercisePhoto('${ex.id}')" style="margin-top:8px; background:#4a1e2c;">🗑️ Удалить фото</button>`;
        } else {
            html += `<button onclick="addPhotoToExercise('${ex.id}')" style="margin-top:8px;">📸 Добавить фото</button>`;
        }
        html += `</div>`;
    }
    html += `</div>`;
    document.getElementById("app").innerHTML = html;
    document.getElementById("addExBtn")?.addEventListener("click",()=>{
        let name = prompt("Название упражнения:");
        if(!name) return;
        let sets = parseInt(prompt("Количество подходов:", "3"));
        if(name && sets) {
            customExercises.push({ name: name, sets: sets, rest: 90, id: "custom_"+Date.now() });
            saveAll();
            render();
        }
    });
}

function renderSettings() {
    document.getElementById("app").innerHTML = `<div class="card">
        <div class="section-title">⚙️ Настройки</div>
        <button class="btn-primary" id="resetBtn" style="background:#4a1e2c;">🗑️ Сбросить ВСЕ данные</button>
        <p style="margin-top:16px;">Все данные хранятся только на вашем устройстве.</p>
        <hr>
        <p><small>📸 Фото упражнений и фото прогресса сохраняются отдельно.<br>💪 Тренировки автоматически отмечаются в календаре.</small></p>
    </div>`;
    document.getElementById("resetBtn")?.addEventListener("click",()=>{
        if(confirm("Удалить абсолютно всё? Восстановить будет нельзя.")) {
            localStorage.clear();
            location.reload();
        }
    });
}

// Глобальные функции
window.stopTimer = stopTimer;
window.startTimer = startTimer;
window.addPhotoToExercise = addPhotoToExercise;
window.deleteExercisePhoto = deleteExercisePhoto;
window.addMeasure = (key, name) => {
    let val = parseFloat(prompt(`${name} (см):`));
    if(!isNaN(val)) {
        bodyMeasure[key].push({ date: getToday(), value: val });
        saveAll();
        render();
    }
};
window.addWeight = () => {
    let w = parseFloat(prompt("Вес (кг):"));
    if(!isNaN(w)) {
        bodyWeight.push({ date: getToday(), weight: w });
        saveAll();
        render();
    }
};
window.viewPhoto = (url) => {
    let modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;';
    modal.innerHTML = `<img src="${url}" style="max-width:90%;max-height:70%;border-radius:20px;"><button onclick="this.parentElement.remove()" style="margin-top:20px;background:#ffb347;padding:10px 20px;border-radius:40px;">Закрыть</button>`;
    document.body.appendChild(modal);
};
window.deletePhoto = (id) => { photos = photos.filter(p => p.id != id); saveAll(); render(); };
window.deleteCustomEx = (idx) => { customExercises.splice(idx,1); saveAll(); render(); };

document.getElementById("nav").addEventListener("click", (e) => {
    let btn = e.target.closest(".nav-btn");
    if(btn && btn.dataset.tab) { currentTab = btn.dataset.tab; stopTimer(); render(); }
});

render();
</script>
</body>
</html>
