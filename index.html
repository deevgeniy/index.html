<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой тренажёрный дневник</title>
    <style>
        body { font-family: system-ui; background: #0a0c0f; color: white; padding: 20px; text-align: center; }
        .card { background: #1a1e28; border-radius: 20px; padding: 16px; margin: 12px 0; }
        button { background: #ffb347; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🏋️ Дневник тренировок</h1>
    <div class="card">
        <p>✅ GitHub Pages работает!</p>
        <p>Сейчас вы видите тестовую страницу.</p>
    </div>
    <button onclick="alert('Всё работает! Теперь можно добавлять календарь и фото')">Проверить</button>
    <div class="card">
        <p>📅 Календарь | 📸 Фото упражнений | ➕ Свои упражнения</p>
        <small>— всё это будет добавлено дальше —</small>
    </div>
    <script>
        console.log("Приложение запущено");
    </script>
</body>
</html>
