<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0c0f">
    <title>GYM LOG PRO — Дневник тренировок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0c0f; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #eef2ff; padding-bottom: 80px; }
        .app-container { max-width: 560px; margin: 0 auto; padding: 18px 16px 90px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 560px; margin: 0 auto; background: #111417e6; backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 16px 22px; border-top: 0.5px solid #2a2f38; z-index: 100; }
        .nav-btn { background: none; border: none; color: #8e96a6; font-size: 13px; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 40px; cursor: pointer; }
        .nav-btn.active { color: #ffb347; background: #1e1f2c; }
        .nav-icon { font-size: 24px; }
        .card { background: #12151c; border-radius: 28px; padding: 20px 16px; margin-bottom: 20px; border: 1px solid #262c34; }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .exercise-card { background: #0f1219; border-radius: 24px; padding: 16px; margin-bottom: 20px; border-left: 3px solid #ffb347; }
        .exercise-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .set-row { background: #1a1e28; border-radius: 20px; padding: 12px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .set-number { font-weight: 600; width: 50px; }
        .input-group { display: flex; gap: 8px; background: #0b0e14; padding: 4px 10px; border-radius: 40px; align-items: center; }
        .input-group input { background: none; border: none; color: #fff; width: 55px; font-size: 16px; font-weight: 500; text-align: center; outline: none; }
        .timer-btn { background: #2a2f3c; border: none; padding: 8px 14px; border-radius: 40px; color: white; font-weight: 500; font-size: 13px; cursor: pointer; }
        .btn-primary { background: #ffb347; border: none; padding: 12px 20px; border-radius: 60px; font-weight: 700; font-size: 15px; color: #0a0c0f; width: 100%; cursor: pointer; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .food-log { background: #0f1219; border-radius: 20px; padding: 12px; margin: 10px 0; }
        button:active { transform: scale(0.97); }
        input[type=number]::-webkit-inner-spin-button { display: none; }
        select { background: #1a1e28; color: white; border-radius: 40px; padding: 8px; border: 1px solid #2a2f38; }
        
        /* Стили для календаря */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; margin-top: 16px; }
        .calendar-weekday { color: #ffb347; font-weight: 600; padding: 8px; }
        .calendar-day { background: #1a1e28; padding: 10px; border-radius: 30px; cursor: pointer; }
        .calendar-day.workout { background: #ffb347; color: #0a0c0f; font-weight: bold; }
        .calendar-day.empty { background: none; cursor: default; }
        .calendar-day.today { border: 2px solid #ffb347; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>
<div class="bottom-nav" id="bottomNav">
    <button class="nav-btn" data-tab="training"><span class="nav-icon">🏋️</span><span>Тренировка</span></button>
    <button class="nav-btn" data-tab="food"><span class="nav-icon">🥗</span><span>Питание</span></button>
    <button class="nav-btn" data-tab="progress"><span class="nav-icon">📈</span><span>Прогресс</span></button>
    <button class="nav-btn" data-tab="calendar"><span class="nav-icon">📅</span><span>Календарь</span></button>
    <button class="nav-btn" data-tab="settings"><span class="nav-icon">⚙️</span><span>Настройки</span></button>
</div>
<script>
    (function() {
        // ДАННЫЕ ТРЕНИРОВОК (из вашего PDF)
        const workoutPlan = {
            1: { name: "День 1. Жимовый (грудь, плечи, трицепс)", exercises: [
                { name: "Жим в рычажном тренажере", sets: 4, targetReps: "8-10", restSec: 150, key: "hammer" },
                { name: "Жим гантелей лежа 30°", sets: 3, targetReps: "10-12", restSec: 120, key: "dbb30" },
                { name: "Сведение рук в кроссовере", sets: 3, targetReps: "12-15", restSec: 90, key: "crossover" },
                { name: "Жим гантелей сидя нейтрально", sets: 4, targetReps: "8-10", restSec: 120, key: "seateddb" },
                { name: "Разведение гантелей в стороны", sets: 3, targetReps: "12-15", restSec: 90, key: "laterals" },
                { name: "Французский жим с гантелью", sets: 3, targetReps: "10-12", restSec: 90, key: "french" },
                { name: "Разгибание рук на блоке (канат)", sets: 3, targetReps: "12-15", restSec: 60, key: "pushdown" }
            ]},
            2: { name: "День 2. Тяговый (спина, бицепс)", exercises: [
                { name: "Тяга штанги в наклоне", sets: 4, targetReps: "8-10", restSec: 150, key: "bentrow" },
                { name: "Тяга верхнего блока широко", sets: 4, targetReps: "10-12", restSec: 120, key: "latpulldown" },
                { name: "Тяга гантели к поясу с упором", sets: 3, targetReps: "10-12", restSec: 105, key: "dbrow" },
                { name: "Тяга нижнего блока узко", sets: 3, targetReps: "10-12", restSec: 105, key: "seatedrow" },
                { name: "Разведение гантелей в наклоне", sets: 3, targetReps: "12-15", restSec: 90, key: "reardelt" },
                { name: "Сгибание рук со штангой EZ", sets: 3, targetReps: "10-12", restSec: 90, key: "ezcurl" },
                { name: "Сгибание рук молот с гантелями", sets: 3, targetReps: "10-12", restSec: 90, key: "hammercurl" },
                { name: "Сгибание рук с канатом на блоке", sets: 3, targetReps: "12-15", restSec: 90, key: "cablecurl" }
            ]},
            3: { name: "День 3. Ноги + кор", exercises: [
                { name: "Жим ногами платформы", sets: 4, targetReps: "10-12", restSec: 150, key: "legpress" },
                { name: "Приседания с гантелью (Goblet)", sets: 4, targetReps: "10-12", restSec: 150, key: "goblet" },
                { name: "Румынская тяга с гантелями", sets: 4, targetReps: "10-12", restSec: 150, key: "romanian" },
                { name: "Сгибание ног лежа", sets: 3, targetReps: "12-15", restSec: 105, key: "legcurl" },
                { name: "Разгибание ног сидя", sets: 3, targetReps: "12-15", restSec: 105, key: "legext" },
                { name: "Скручивания на римском стуле", sets: 3, targetReps: "15-20", restSec: 90, key: "crunch" },
                { name: "Гиперэкстензия с округлением", sets: 3, targetReps: "15-20", restSec: 90, key: "hyper" }
            ]}
        };
        const foodDB = {
            "куриное филе": { p:23, f:1.8, c:0, kcal:110 }, "творог 5%": { p:17, f:5, c:2.5, kcal:121 },
            "рис белый": { p:7, f:0.6, c:78, kcal:345 }, "гречка": { p:12, f:3, c:62, kcal:313 },
            "овсянка": { p:12, f:6, c:62, kcal:320 }, "банан": { p:1.5, f:0.3, c:22, kcal:105 },
            "яйцо": { p:12.5, f:11, c:0.7, kcal:155 }, "протеин": { p:75, f:5, c:8, kcal:380 },
            "оливковое масло": { p:0, f:99.8, c:0, kcal:884 }, "говядина": { p:26, f:12, c:0, kcal:210 }
        };
        let currentTab = "training", activeDay = 1, currentExerciseIdx = 0, timerInterval = null, timerRemaining = 0, activeTimerInfo = null;
        let sessionData = JSON.parse(localStorage.getItem("gym_session") || '{"workouts":{},"historyMax":{},"workoutDates":[]}');
        let foodLog = JSON.parse(localStorage.getItem("food_log") || '{"meals":{"Завтрак":[],"Обед":[],"Перед тренировкой":[],"После тренировки":[],"Ужин":[],"Перед сном":[]}}');
        function saveSession() { localStorage.setItem("gym_session", JSON.stringify(sessionData)); }
        function initWorkoutSession(day) { if(!sessionData.workouts[day]) { let exData = {}; workoutPlan[day].exercises.forEach((_, idx) => { exData[idx] = Array(workoutPlan[day].exercises[idx].sets).fill().map(()=>({weight:"",reps:""})); }); sessionData.workouts[day] = exData; saveSession(); } }
        function updateMax(day, exIdx, w, r) { let key = workoutPlan[day].exercises[exIdx].key; if(key && w && r) { let vol = parseFloat(w)*parseFloat(r); if(!isNaN(vol) && vol > (sessionData.historyMax[key]||0)) sessionData.historyMax[key]=vol; saveSession(); } }
        function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; timerRemaining=0; activeTimerInfo=null; renderCurrentView(); }
        function startTimer(sec, day, exIdx, setIdx) { stopTimer(); timerRemaining=sec; activeTimerInfo={day,exIdx,setIdx}; timerInterval=setInterval(()=>{ if(timerRemaining<=1){ stopTimer(); alert("⏰ Отдых закончен!"); renderCurrentView(); } else { timerRemaining--; renderCurrentView(); } },1000); renderCurrentView(); }
        function updateSet(day, exIdx, setIdx, w, r) { initWorkoutSession(day); sessionData.workouts[day][exIdx][setIdx]={weight:w,reps:r}; saveSession(); if(w && r) updateMax(day, exIdx, w, r); renderCurrentView(); }
        
        function renderCurrentView() { 
            if(currentTab==="training") renderTraining(); 
            else if(currentTab==="food") renderFood(); 
            else if(currentTab==="progress") renderProgress(); 
            else if(currentTab==="calendar") renderCalendar(); 
            else renderSettings(); 
            document.querySelectorAll(".nav-btn").forEach(btn=>{ 
                if(btn.dataset.tab===currentTab) btn.classList.add("active"); 
                else btn.classList.remove("active"); 
            }); 
        }
        
        function renderTraining() { 
            initWorkoutSession(activeDay); 
            let plan=workoutPlan[activeDay], ex=plan.exercises[currentExerciseIdx], setsData=sessionData.workouts[activeDay][currentExerciseIdx]||[]; 
            let timerHtml=""; 
            if(timerInterval && activeTimerInfo && activeTimerInfo.day===activeDay && activeTimerInfo.exIdx===currentExerciseIdx){ 
                let m=Math.floor(timerRemaining/60), s=timerRemaining%60; 
                timerHtml=`<div class="card" style="background:#1f2a1f;text-align:center"><div style="font-size:24px">⏱️ Отдых: ${m}:${s<10?'0'+s:s}</div><button class="timer-btn" id="stopTimerBtn">Остановить</button></div>`; 
            } 
            let setsHtml=""; 
            for(let i=0;i<ex.sets;i++){ 
                let s=setsData[i]||{weight:"",reps:""}; 
                setsHtml+=`<div class="set-row"><span class="set-number">Подход ${i+1}</span><div class="input-group"><label>кг</label><input type="number" id="w_${i}" value="${s.weight}" placeholder="0"></div><div class="input-group"><label>повт</label><input type="number" id="r_${i}" value="${s.reps}" placeholder="0"></div><button class="timer-btn" data-setidx="${i}">⏱️ ${Math.floor(ex.restSec/60)}:${(ex.restSec%60).toString().padStart(2,'0')}</button></div>`; 
            } 
            let html=`<div class="card"><div class="flex-between"><span class="section-title">💪 ${plan.name}</span><select id="daySelect"><option value="1">День 1 Жим</option><option value="2">День 2 Тяга</option><option value="3">День 3 Ноги</option></select></div><div class="exercise-card"><div class="exercise-name">🏋️ ${ex.name} (${ex.targetReps} повт)</div>${setsHtml}${timerHtml}<button class="btn-primary" id="completeExBtn">✓ Завершить упражнение</button></div><div style="display:flex; gap:12px;"><button class="timer-btn" id="prevEx" ${currentExerciseIdx===0?'disabled':''}>◀ Предыдущее</button><button class="timer-btn" id="nextEx" ${currentExerciseIdx===plan.exercises.length-1?'disabled':''}>Следующее ▶</button></div></div>`; 
            document.getElementById("appRoot").innerHTML=html; 
            document.getElementById("daySelect").value=activeDay; 
            document.getElementById("daySelect").onchange=(e)=>{ activeDay=parseInt(e.target.value); currentExerciseIdx=0; renderCurrentView(); }; 
            for(let i=0;i<ex.sets;i++){ 
                let wInp=document.getElementById(`w_${i}`), rInp=document.getElementById(`r_${i}`); 
                if(wInp) wInp.onchange=(e)=>updateSet(activeDay,currentExerciseIdx,i,e.target.value,rInp?.value||""); 
                if(rInp) rInp.onchange=(e)=>updateSet(activeDay,currentExerciseIdx,i,wInp?.value||"",e.target.value); 
                let btn=document.querySelector(`.timer-btn[data-setidx="${i}"]`); 
                if(btn) btn.onclick=()=>startTimer(ex.restSec,activeDay,currentExerciseIdx,i); 
            } 
            document.getElementById("prevEx")?.addEventListener("click",()=>{ if(currentExerciseIdx>0){ currentExerciseIdx--; stopTimer(); renderCurrentView(); } }); 
            document.getElementById("nextEx")?.addEventListener("click",()=>{ 
                if(currentExerciseIdx+1<plan.exercises.length){ 
                    currentExerciseIdx++; stopTimer(); renderCurrentView(); 
                } else { 
                    // Сохраняем дату тренировки в календарь
                    let todayDate = new Date().toISOString().split('T')[0];
                    if(!sessionData.workoutDates) sessionData.workoutDates = [];
                    if(!sessionData.workoutDates.includes(todayDate)) {
                        sessionData.workoutDates.push(todayDate);
                        saveSession();
                    }
                    alert("🎉 Тренировка дня завершена!"); 
                } 
            }); 
            document.getElementById("completeExBtn")?.addEventListener("click",()=>{ 
                let all=true; 
                for(let i=0;i<ex.sets;i++){ 
                    let d=sessionData.workouts[activeDay][currentExerciseIdx][i]; 
                    if(!d || !d.weight || !d.reps) all=false; 
                } 
                if(!all) alert("Заполните вес и повторения для всех подходов!"); 
                else if(currentExerciseIdx+1<plan.exercises.length){ 
                    currentExerciseIdx++; stopTimer(); renderCurrentView(); 
                } else { 
                    // Сохраняем дату тренировки в календарь
                    let todayDate = new Date().toISOString().split('T')[0];
                    if(!sessionData.workoutDates) sessionData.workoutDates = [];
                    if(!sessionData.workoutDates.includes(todayDate)) {
                        sessionData.workoutDates.push(todayDate);
                        saveSession();
                    }
                    alert("🎉 Отлично! Тренировка дня завершена!"); 
                } 
            }); 
            if(document.getElementById("stopTimerBtn")) document.getElementById("stopTimerBtn").onclick=()=>stopTimer(); 
        }
        
        function renderFood(){ let total={p:0,f:0,c:0,kcal:0}; for(let m in foodLog.meals) foodLog.meals[m].forEach(i=>{ total.p+=i.p; total.f+=i.f; total.c+=i.c; total.kcal+=i.kcal; }); let mealsHtml=""; for(let meal of ["Завтрак","Обед","Перед тренировкой","После тренировки","Ужин","Перед сном"]){ let items=foodLog.meals[meal]; let list=items.map((it,idx)=>`<div class="flex-between"><span>${it.name} ${it.qty}g</span><span>${it.p}г/${it.f}г/${it.c}г/${it.kcal}ккал</span><button class="remove-food" data-meal="${meal}" data-idx="${idx}" style="background:none;color:#ff8866;">✖</button></div>`).join(""); mealsHtml+=`<div class="food-log"><div class="flex-between"><strong>${meal}</strong><button class="add-food-btn" data-meal="${meal}">+ Добавить</button></div>${list||"<div style='color:#6c7a8c;'>— нет записей —</div>"}</div>`; } let html=`<div class="card"><div class="section-title">🍽️ БЖУ за сегодня</div><div class="flex-between" style="background:#1a1e28;border-radius:40px;padding:12px;"><span>🥩 Белки ${total.p.toFixed(1)}г</span><span>🧈 Жиры ${total.f.toFixed(1)}г</span><span>🍚 Углеводы ${total.c.toFixed(1)}г</span><span>🔥 ${total.kcal.toFixed(0)} ккал</span></div></div><div class="card">${mealsHtml}</div><div class="card"><div class="section-title">📦 Быстрые продукты</div><div id="quickFoods" style="display:flex;flex-wrap:wrap;gap:8px;"></div></div>`; document.getElementById("appRoot").innerHTML=html; let quick=["куриное филе","творог 5%","рис белый","гречка","банан","овсянка","протеин","оливковое масло"]; quick.forEach(f=>{ let btn=document.createElement("button"); btn.innerText=f; btn.className="timer-btn"; btn.onclick=()=>{ let g=prompt("Граммы:","100"); if(g) addFoodToMeal("Завтрак",f,parseFloat(g)); }; document.getElementById("quickFoods")?.appendChild(btn); }); document.querySelectorAll(".add-food-btn").forEach(btn=>{ btn.onclick=()=>{ let meal=btn.dataset.meal; let name=prompt("Название продукта:","куриное филе"); let grams=prompt("Граммы:","100"); if(name && grams && foodDB[name.toLowerCase()]) addFoodToMeal(meal,name.toLowerCase(),parseFloat(grams)); else alert("Продукт не найден"); }; }); document.querySelectorAll(".remove-food").forEach(btn=>{ btn.onclick=()=>{ let meal=btn.dataset.meal; let idx=parseInt(btn.dataset.idx); foodLog.meals[meal].splice(idx,1); localStorage.setItem("food_log",JSON.stringify(foodLog)); renderFood(); }; }); }
        function addFoodToMeal(meal,name,grams){ let f=foodDB[name]; if(!f) return; let mult=grams/100; foodLog.meals[meal].push({name,qty:grams, p:+(f.p*mult).toFixed(1), f:+(f.f*mult).toFixed(1), c:+(f.c*mult).toFixed(1), kcal:Math.round(f.kcal*mult)}); localStorage.setItem("food_log",JSON.stringify(foodLog)); renderFood(); }
        function renderProgress(){ let maxData=sessionData.historyMax; let html=`<div class="card"><div class="section-title">📊 Лучшие объёмы (кг×повт)</div>`; for(let [k,v] of Object.entries(maxData)) html+=`<div class="flex-between"><span>${k}</span><strong>${Math.round(v)}</strong></div><div style="background:#2a2f38;height:6px;border-radius:30px;margin:8px 0;"><div style="width:${Math.min(100,v/600*100)}%;background:#ffb347;height:6px;border-radius:30px;"></div></div>`; html+=`<p style="margin-top:16px;">💡 Прогрессируйте вес или повторения.</p></div>`; document.getElementById("appRoot").innerHTML=html; }
        function renderSettings(){ let html=`<div class="card"><div class="section-title">⚙️ Настройки</div><button class="timer-btn" id="resetAll" style="background:#4a1e2c;">Сбросить ВСЕ данные</button><p style="margin-top:16px;">🏆 Приложение по науке бодибилдинга.</p></div>`; document.getElementById("appRoot").innerHTML=html; document.getElementById("resetAll")?.addEventListener("click",()=>{ if(confirm("Удалить всё?")){ localStorage.clear(); sessionData={workouts:{},historyMax:{},workoutDates:[]}; foodLog={meals:{"Завтрак":[],"Обед":[],"Перед тренировкой":[],"После тренировки":[],"Ужин":[],"Перед сном":[]}}; saveSession(); localStorage.setItem("food_log",JSON.stringify(foodLog)); renderCurrentView(); } }); }
        
        // ========== КАЛЕНДАРЬ ==========
        function renderCalendar() {
            let today = new Date();
            let year = today.getFullYear();
            let month = today.getMonth();
            let weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            let firstDay = new Date(year, month, 1);
            let startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            let daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let days = [];
            for (let i = 0; i < startOffset; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);
            
            let calendarHtml = `<div class="calendar">`;
            weekdays.forEach(day => { calendarHtml += `<div class="calendar-weekday">${day}</div>`; });
            
            days.forEach(day => {
                if (day === null) {
                    calendarHtml += `<div class="calendar-day empty"></div>`;
                } else {
                    let dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    let hasWorkout = sessionData.workouts[dateStr] && Object.keys(sessionData.workouts[dateStr]).length > 0;
                    let isToday = (today.getDate() === day && today.getMonth() === month && today.getFullYear() === year);
                    let todayClass = isToday ? 'today' : '';
                    calendarHtml += `<div class="calendar-day ${hasWorkout ? 'workout' : ''} ${todayClass}" onclick="window.selectDateFn('${dateStr}')">${day}</div>`;
                }
            });
            calendarHtml += `</div>`;
            
            let totalWorkouts = Object.keys(sessionData.workouts).filter(date => Object.keys(sessionData.workouts[date]).length > 0).length;
            
            let html = `<div class="card">
                <div class="section-title">📅 Календарь тренировок</div>
                <div style="text-align: center; margin-bottom: 16px;">
                    <span style="background:#ffb34720; padding: 6px 12px; border-radius: 40px;">
                        📆 ${String(day).padStart(2,'0')}.${String(month+1).padStart(2,'0')}.${year}
                    </span>
                </div>
                ${calendarHtml}
                <div style="margin-top: 16px; display: flex; justify-content: space-between;">
                    <span>🏆 Всего тренировок: <strong>${totalWorkouts}</strong></span>
                    <span>⭐ Жёлтые дни — тренировка выполнена</span>
                </div>
                <button class="btn-primary" id="goToTodayWorkout" style="margin-top: 16px;">🏋️ Перейти к сегодняшней тренировке</button>
            </div>`;
            document.getElementById("appRoot").innerHTML = html;
            
            document.getElementById("goToTodayWorkout")?.addEventListener("click", () => {
                currentTab = "training";
                renderCurrentView();
            });
            
            window.selectDateFn = function(dateStr) {
                let hasWorkout = sessionData.workouts[dateStr] && Object.keys(sessionData.workouts[dateStr]).length > 0;
                if(hasWorkout) {
                    alert(`✅ Тренировка за ${dateStr} выполнена!\nЗаписей: ${Object.keys(sessionData.workouts[dateStr]).length} упражнений`);
                } else {
                    alert(`❌ Тренировка за ${dateStr} не выполнялась.\nВы можете потренироваться сегодня!`);
                }
            };
        }
        
        document.getElementById("bottomNav").addEventListener("click",(e)=>{ let btn=e.target.closest(".nav-btn"); if(btn && btn.dataset.tab){ currentTab=btn.dataset.tab; stopTimer(); renderCurrentView(); } });
        renderCurrentView();
    })();
</script>
</body>
</html>
