<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM LOG</title>
    <style>
        body {
            background: #0a0c0f;
            font-family: system-ui;
            color: white;
            padding: 20px;
            padding-bottom: 80px;
            margin: 0;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111417;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            z-index: 100;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #8e96a6;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 30px;
        }
        .nav-btn.active {
            color: #ffb347;
            background: #1e1f2c;
        }
        .card {
            background: #12151c;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #262c34;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .set-row {
            background: #1a1e28;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input {
            background: #0b0e14;
            border: none;
            color: white;
            width: 60px;
            padding: 8px;
            border-radius: 20px;
            text-align: center;
        }
        button {
            background: #2a2f3c;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .btn-orange {
            background: #ffb347;
            color: black;
            font-weight: bold;
        }
        .flex {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .photo-img {
            width: 100%;
            border-radius: 16px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div class="bottom-nav" id="nav">
        <button class="nav-btn active" data-tab="workout">🏋️ Тренировка</button>
        <button class="nav-btn" data-tab="photos">📸 Фото</button>
        <button class="nav-btn" data-tab="records">📈 Рекорды</button>
    </div>

    <script>
        // Простые данные
        let currentTab = "workout";
        
        // Список упражнений
        const exercises = [
            "Жим гантелей лежа",
            "Тяга штанги", 
            "Приседания",
            "Жим ногами"
        ];
        let currentExIndex = 0;
        
        // Данные тренировок
        let workoutData = JSON.parse(localStorage.getItem("workoutData")) || {};
        let records = JSON.parse(localStorage.getItem("records")) || {};
        
        // Таймер
        let timerInterval = null;
        let timerSeconds = 0;
        let timerActive = false;
        
        function saveData() {
            localStorage.setItem("workoutData", JSON.stringify(workoutData));
            localStorage.setItem("records", JSON.stringify(records));
        }
        
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }
        
        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerActive = false;
            render();
        }
        
        function startTimer(seconds) {
            stopTimer();
            timerSeconds = seconds;
            timerActive = true;
            timerInterval = setInterval(() => {
                if (timerSeconds <= 1) {
                    stopTimer();
                    alert("⏰ Отдых закончен!");
                } else {
                    timerSeconds--;
                    render();
                }
            }, 1000);
            render();
        }
        
        function updateSet(exercise, setIndex, weight, reps) {
            let today = getToday();
            if (!workoutData[today]) workoutData[today] = {};
            if (!workoutData[today][exercise]) workoutData[today][exercise] = [];
            workoutData[today][exercise][setIndex] = { weight, reps };
            
            // Обновляем рекорды
            let vol = parseFloat(weight) * parseFloat(reps);
            if (!isNaN(vol) && vol > (records[exercise] || 0)) {
                records[exercise] = vol;
            }
            saveData();
            render();
        }
        
        function renderWorkout() {
            let ex = exercises[currentExIndex];
            let today = getToday();
            let setsData = workoutData[today]?.[ex] || [];
            
            // Таймер
            let timerHtml = "";
            if (timerActive) {
                let mins = Math.floor(timerSeconds / 60);
                let secs = timerSeconds % 60;
                timerHtml = `<div class="card" style="background:#1f2a1f; text-align:center">
                    ⏱️ Отдых: ${mins}:${secs < 10 ? '0'+secs : secs}
                    <button onclick="stopTimer()" style="margin-left:10px">Стоп</button>
                </div>`;
            }
            
            // Подходы
            let setsHtml = "";
            for (let i = 0; i < 4; i++) {
                let s = setsData[i] || { weight: "", reps: "" };
                setsHtml += `
                    <div class="set-row">
                        <span>Подход ${i+1}</span>
                        <input type="number" id="w_${i}" value="${s.weight}" placeholder="кг" style="width:70px">
                        <input type="number" id="r_${i}" value="${s.reps}" placeholder="повт" style="width:70px">
                        <button onclick="startTimer(90)">⏱️ 1:30</button>
                    </div>
                `;
            }
            
            let html = `
                <div class="card">
                    <div class="title">💪 ${ex}</div>
                    ${setsHtml}
                    ${timerHtml}
                    <div class="flex">
                        <button ${currentExIndex === 0 ? 'disabled' : ''} onclick="changeEx(-1)">◀ Назад</button>
                        <button class="btn-orange" style="flex:1" onclick="saveAndNext()">✓ Сохранить</button>
                        <button ${currentExIndex === exercises.length-1 ? 'disabled' : ''} onclick="changeEx(1)">Вперёд ▶</button>
                    </div>
                </div>
            `;
            
            document.getElementById("app").innerHTML = html;
            
            // Привязываем обработчики к инпутам
            for (let i = 0; i < 4; i++) {
                let wInp = document.getElementById(`w_${i}`);
                let rInp = document.getElementById(`r_${i}`);
                if (wInp) {
                    wInp.onchange = (e) => updateSet(ex, i, e.target.value, rInp?.value || "");
                }
                if (rInp) {
                    rInp.onchange = (e) => updateSet(ex, i, wInp?.value || "", e.target.value);
                }
            }
        }
        
        function renderPhotos() {
            let photos = JSON.parse(localStorage.getItem("photos") || "[]");
            let photosHtml = "";
            
            for (let i = 0; i < photos.length; i++) {
                photosHtml += `
                    <div class="card">
                        <div><strong>📅 ${photos[i].date}</strong></div>
                        <img src="${photos[i].data}" class="photo-img">
                        <div style="margin-top:8px">${photos[i].comment || ""}</div>
                        <button onclick="deletePhoto(${i})" style="margin-top:8px; background:#4a1e2c">🗑️ Удалить</button>
                    </div>
                `;
            }
            
            if (photos.length === 0) {
                photosHtml = `<div class="card">Нет фото. Добавьте первое!</div>`;
            }
            
            let html = `
                <div class="card">
                    <div class="title">📸 Мои фото</div>
                    <button class="btn-orange" onclick="addPhoto()" style="width:100%">➕ Добавить фото</button>
                </div>
                ${photosHtml}
            `;
            
            document.getElementById("app").innerHTML = html;
        }
        
        function renderRecords() {
            let html = `<div class="card"><div class="title">📈 Рекорды (кг×повт)</div>`;
            for (let [ex, vol] of Object.entries(records)) {
                html += `<div style="display:flex; justify-content:space-between; padding:8px 0">
                    <span>${ex}</span>
                    <strong style="color:#ffb347">${Math.round(vol)}</strong>
                </div>`;
            }
            if (Object.keys(records).length === 0) {
                html += `<p>Нет рекордов. Тренируйся!</p>`;
            }
            html += `</div>`;
            document.getElementById("app").innerHTML = html;
        }
        
        function render() {
            if (currentTab === "workout") renderWorkout();
            else if (currentTab === "photos") renderPhotos();
            else renderRecords();
            
            // Обновляем активную кнопку
            document.querySelectorAll(".nav-btn").forEach(btn => {
                if (btn.dataset.tab === currentTab) btn.classList.add("active");
                else btn.classList.remove("active");
            });
        }
        
        // Глобальные функции для onclick
        window.changeEx = (delta) => {
            let newIndex = currentExIndex + delta;
            if (newIndex >= 0 && newIndex < exercises.length) {
                currentExIndex = newIndex;
                stopTimer();
                render();
            }
        };
        
        window.saveAndNext = () => {
            if (currentExIndex + 1 < exercises.length) {
                currentExIndex++;
                stopTimer();
                render();
            } else {
                alert("🎉 Тренировка завершена! Отличная работа!");
            }
        };
        
        window.addPhoto = () => {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                if (file) {
                    let reader = new FileReader();
                    reader.onload = (ev) => {
                        let comment = prompt("Комментарий:", "Мой прогресс");
                        let photos = JSON.parse(localStorage.getItem("photos") || "[]");
                        photos.unshift({
                            date: getToday(),
                            comment: comment || "",
                            data: ev.target.result
                        });
                        localStorage.setItem("photos", JSON.stringify(photos));
                        render();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };
        
        window.deletePhoto = (index) => {
            if (confirm("Удалить фото?")) {
                let photos = JSON.parse(localStorage.getItem("photos") || "[]");
                photos.splice(index, 1);
                localStorage.setItem("photos", JSON.stringify(photos));
                render();
            }
        };
        
        window.stopTimer = stopTimer;
        window.startTimer = startTimer;
        
        // Навигация
        document.getElementById("nav").addEventListener("click", (e) => {
            let btn = e.target.closest(".nav-btn");
            if (btn && btn.dataset.tab) {
                currentTab = btn.dataset.tab;
                stopTimer();
                render();
            }
        });
        
        // Запуск
        render();
    </script>
</body>
</html>
